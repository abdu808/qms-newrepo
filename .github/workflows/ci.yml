name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-unit-tests:
    name: API unit tests + prisma validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install deps
        run: npm ci

      # Fails CI if schema.prisma has syntax / relation errors.
      - name: Prisma validate
        run: npx prisma validate

      # Fails CI if the generated client doesn't match the schema
      # (this catches forgotten `prisma generate` in dev).
      - name: Prisma generate (dry)
        run: npx prisma generate

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test

  api-integration-tests:
    name: API integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: test-ci-secret-not-for-production
