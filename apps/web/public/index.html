                              </div>
                            </li>
                          </template>
                        </ol>
                      </template>
                      <template x-if="!detailTimeline().length">
                        <div class="text-xs text-gray-400 text-center py-4">لا توجد أحداث مسجّلة بعد</div>
                      </template>
                    </div>

                    <!-- Actions footer -->
                    <div class="pt-3 border-t flex gap-2 flex-wrap">
                      <button @click="detailOpenFullEdit()"
                              class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded">✏️ تعديل كامل</button>
                      <button @click="closeDetail()"
                              class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm px-4 py-2 rounded">إغلاق</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </aside>
        </div>
        <style>@keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }</style>

        <!-- BENEFICIARY ASSESSMENT MODAL (Batch 15) -->
        <div x-show="benAssess.open" x-cloak
             class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
             @keydown.escape.window="benAssess.open=false">
          <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl"
               @click.outside="benAssess.open=false">
            <div class="p-4 border-b bg-gradient-to-l from-cyan-600 to-teal-600 text-white rounded-t-xl flex justify-between items-center">
              <div>
                <div class="text-xs opacity-80">📋 تقييم احتياجات — ISO 8.2.2 · P-08 §3</div>
                <h3 class="font-bold text-lg" x-text="benAssess.fullName"></h3>
                <div class="text-xs opacity-80" x-text="benAssess.code"></div>
              </div>
              <button @click="benAssess.open=false" class="text-white/80 hover:text-white text-xl">✖</button>
            </div>
            <div class="p-4 space-y-3">
              <div x-show="benAssess.needsReview" class="bg-amber-50 border border-amber-300 rounded p-2 text-sm text-amber-900">
                ⏱️ هذا المستفيد مُستحق لإعادة تقييم دورية.
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">وصف الاحتياجات <span class="text-red-600">*</span></label>
                <textarea x-model="benAssess.needsAssessment" rows="3"
                          class="w-full border rounded p-2 text-sm"
                          placeholder="سكن، تعليم، علاج، غذاء… تفاصيل كافية"></textarea>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-semibold mb-1">الدخل الشهري (ر.س)</label>
                  <input type="number" x-model="benAssess.monthlyIncome" @input="previewBeneficiaryAssess()"
                         class="w-full border rounded p-2 text-sm">
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-1">عدد أفراد الأسرة</label>
                  <input type="number" min="1" x-model="benAssess.familySize" @input="previewBeneficiaryAssess()"
                         class="w-full border rounded p-2 text-sm">
                </div>
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">مؤشرات الحماية</label>
                <div class="grid grid-cols-2 gap-2">
                  <template x-for="f in benAssess.flagsMeta" :key="f.key">
                    <label class="flex items-center gap-2 text-xs bg-gray-50 border rounded p-2 cursor-pointer hover:bg-gray-100">
                      <input type="checkbox"
                             :checked="benAssess.vulnerabilityFlags?.includes(f.key)"
                             @change="toggleVulnFlag(f.key)">
                      <span x-text="f.label"></span>
                    </label>
                  </template>
                </div>
              </div>

              <!-- Computed preview -->
              <template x-if="benAssess.preview">
                <div class="bg-gradient-to-l from-cyan-50 to-teal-50 border border-cyan-200 rounded-lg p-3">
                  <div class="flex justify-between items-center flex-wrap gap-2">
                    <div>
                      <div class="text-xs text-gray-600">درجة الأولوية المحسوبة</div>
                      <div class="text-3xl font-bold text-cyan-700" x-text="benAssess.preview.score + ' / 5'"></div>
                    </div>
                    <div>
                      <div class="text-xs text-gray-600">التوصية</div>
                      <div class="font-bold text-base" x-text="recommendationLabel(benAssess.preview.recommendation)"></div>
                    </div>
                  </div>
                  <template x-if="benAssess.preview.breakdown">
                    <div class="text-xs text-gray-600 mt-2 grid grid-cols-2 gap-1">
                      <div>الفئة (أساس): <b x-text="benAssess.preview.breakdown.categoryBase ?? '—'"></b></div>
                      <div>العامل الاقتصادي: <b x-text="benAssess.preview.breakdown.economicPoints"></b></div>
                      <div>مؤشرات الحماية: <b x-text="benAssess.preview.breakdown.vulnPoints"></b></div>
                      <div>حجم الأسرة: <b x-text="benAssess.preview.breakdown.familyPoints"></b></div>
                      <div x-show="benAssess.preview.incomePerCapita != null" class="col-span-2">
                        نصيب الفرد: <b x-text="benAssess.preview.incomePerCapita"></b> ر.س
                        (خط الفقر المرجعي: <span x-text="benAssess.preview.povertyLine || 1100"></span>)
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- Manual override -->
              <div class="flex items-center gap-3 text-sm">
                <label class="flex items-center gap-2">
                  <input type="checkbox" x-model="benAssess.useComputedScore">
                  <span>استخدم الدرجة المحسوبة آلياً</span>
                </label>
                <input type="number" min="1" max="5" x-model.number="benAssess.priorityScore"
                       :disabled="benAssess.useComputedScore"
                       class="w-20 border rounded p-1 text-center"
                       :class="benAssess.useComputedScore ? 'bg-gray-100' : ''">
                <span class="text-xs text-gray-500">/5 يدوياً (يتطلب تبرير في الملاحظات)</span>
              </div>

              <div class="flex gap-2 pt-2 border-t">
                <button @click="submitBeneficiaryAssess()" class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white rounded py-2 font-bold">💾 اعتماد التقييم</button>
                <button @click="benAssess.open=false" class="px-4 py-2 border rounded hover:bg-gray-50">إلغاء</button>
              </div>
            </div>
          </div>
        </div>

        <!-- SURVEY RESULTS MODAL -->
        <div x-show="surveySummary.open" x-cloak class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" @keydown.escape.window="surveySummary.open=false">
          <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl" @click.outside="surveySummary.open=false">
            <div class="p-4 border-b flex justify-between items-center">
              <div>
                <h3 class="font-bold text-brand-700">📊 نتائج الاستبيان</h3>
                <p class="text-sm text-gray-500 mt-0.5" x-text="surveySummary.survey?.title"></p>
              </div>
              <button @click="surveySummary.open=false" class="text-gray-400 hover:text-gray-700 text-xl">✖</button>
            </div>
            <div class="p-4 space-y-3" x-show="surveySummary.data">
              <!-- ملخّص رفيع المستوى (Batch 15) -->
              <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <div class="bg-brand-50 border border-brand-200 rounded-lg p-3 text-center">
                  <div class="text-2xl font-bold text-brand-700" x-text="surveySummary.data?.totalResponses"></div>
                  <div class="text-xs text-gray-500">مشاركات</div>
                </div>
                <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-center">
                  <div class="text-2xl font-bold text-amber-700" x-text="(surveySummary.data?.overallAvg ?? '—') + ' ⭐'"></div>
                  <div class="text-xs text-gray-500">المعدل الإجمالي</div>
                </div>
                <div class="rounded-lg p-3 text-center"
                     :class="(surveySummary.data?.overallNps ?? 0) >= 30 ? 'bg-green-50 border border-green-200' : (surveySummary.data?.overallNps ?? 0) >= 0 ? 'bg-amber-50 border border-amber-200' : 'bg-red-50 border border-red-200'">
                  <div class="text-2xl font-bold" x-text="(surveySummary.data?.overallNps ?? '—')"></div>
                  <div class="text-xs text-gray-500">NPS</div>
                </div>
                <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
                  <div class="text-2xl font-bold text-emerald-700" x-text="(surveySummary.data?.satisfactionPct ?? '—') + '%'"></div>
                  <div class="text-xs text-gray-500">نسبة الراضين (≥4⭐)</div>
                </div>
              </div>

              <!-- Trend (شهري) -->
              <template x-if="surveySummary.data?.trend?.length">
                <div class="border rounded-lg p-3 bg-white">
                  <div class="font-semibold text-sm mb-2">📈 الاتجاه الشهري</div>
                  <div class="flex items-end gap-1 h-24">
                    <template x-for="t in surveySummary.data.trend" :key="t.month">
                      <div class="flex-1 flex flex-col items-center gap-1" :title="t.month + ': ' + t.avgScore + ' (' + t.samples + ')'">
                        <div class="w-full bg-brand-500 rounded-t transition-all"
                             :style="'height:' + (t.avgScore/5*100) + '%'"></div>
                        <div class="text-[10px] text-gray-500" x-text="t.month.slice(5)"></div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- CSV export -->
              <div class="text-left">
                <a :href="'/api/surveys/' + (surveySummary.survey?.id) + '/export.csv'"
                   class="inline-block text-xs bg-gray-700 text-white px-3 py-1.5 rounded hover:bg-gray-800">
                  ⬇ تصدير الردود (CSV)
                </a>
              </div>

              <template x-for="st in (surveySummary.data?.stats || [])" :key="st.key">
                <div class="border rounded-lg p-3 bg-gray-50">
                  <div class="font-semibold text-sm mb-2" x-text="st.label"></div>
                  <template x-if="st.type==='rating'">
                    <div>
                      <div class="flex items-baseline gap-3 flex-wrap">
                        <div class="text-2xl font-bold text-amber-600" x-text="(st.avgScore || 0).toFixed(2) + ' ⭐'"></div>
                        <div class="text-xs text-gray-600">وسيط: <b x-text="st.median ?? '—'"></b></div>
                        <div class="text-xs text-gray-600">NPS: <b x-text="st.nps ?? '—'"></b></div>
                        <div class="text-xs text-gray-600">رضا: <b x-text="(st.satisfactionPct ?? '—') + '%'"></b></div>
                        <div class="text-xs text-gray-500" x-text="st.responsesCount + ' مشاركة'"></div>
                      </div>
                      <!-- التوزيع -->
                      <template x-if="st.distribution">
                        <div class="mt-2 space-y-1">
                          <template x-for="n in [5,4,3,2,1]" :key="n">
                            <div class="flex items-center gap-2 text-xs">
                              <span class="w-6 text-amber-600" x-text="n + '⭐'"></span>
                              <div class="flex-1 bg-gray-200 rounded h-2 overflow-hidden">
                                <div class="h-full bg-amber-500"
                                     :style="'width:' + (st.responsesCount ? (st.distribution[n] / st.responsesCount * 100) : 0) + '%'"></div>
                              </div>
                              <span class="w-8 text-gray-600" x-text="st.distribution[n]"></span>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="st.type==='yesno'">
                    <div>
                      <div class="flex gap-4">
                        <div class="text-green-700"><span class="font-bold" x-text="st.yes"></span> ✅ نعم</div>
                        <div class="text-red-700"><span class="font-bold" x-text="st.no"></span> ❌ لا</div>
                        <div class="text-xs text-gray-600 self-center">نسبة "نعم": <b x-text="(st.yesPct ?? '—') + '%'"></b></div>
                      </div>
                    </div>
                  </template>
                  <template x-if="st.type==='text'">
                    <div class="space-y-1 max-h-40 overflow-y-auto">
                      <template x-for="(ans, i) in st.textAnswers" :key="i">
                        <div class="text-xs bg-white border rounded px-2 py-1" x-text="ans"></div>
                      </template>
                      <div x-show="!st.textAnswers?.length" class="text-xs text-gray-400">لا توجد إجابات نصية</div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- ═══ MAIN CRUD MODAL — نموذج الإضافة والتعديل ════════════ -->
        <div x-show="modal.open" x-cloak
             class="fixed inset-0 z-50 flex items-center justify-center p-4"
             @keydown.escape.window="tryCloseModal()"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-end="opacity-0">

          <!-- Backdrop -->
          <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="tryCloseModal()"></div>

          <!-- Card -->
          <div class="relative bg-white rounded-2xl w-full max-w-2xl max-h-[92vh] flex flex-col shadow-2xl overflow-hidden"
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0 scale-95 translate-y-2"
               x-transition:enter-end="opacity-100 scale-100 translate-y-0">

            <!-- ── Header ───────────────────────────────────────── -->
            <div class="bg-gradient-to-l from-brand-700 to-brand-500 text-white px-6 py-4 flex items-center justify-between flex-shrink-0">
              <div>
                <p class="text-xs text-white/60 mb-0.5" x-text="modal.mode==='edit' ? 'تعديل السجل' : 'سجل جديد'"></p>
                <h3 class="font-bold text-lg leading-tight"
                    x-text="(modal.mode==='edit' ? '✏️ تعديل ' : '➕ إضافة ') + (menu.find(m=>m.id===page)?.label || '')"></h3>
              </div>
              <button type="button" @click="tryCloseModal()" title="إغلاق (Esc)"
                      class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 text-white flex items-center justify-center text-lg transition-colors">✕</button>
            </div>

            <!-- ── Form body ────────────────────────────────────── -->
            <form @submit.prevent="save()" novalidate class="overflow-y-auto flex-1 px-6 py-5">
              <div class="grid grid-cols-2 gap-x-4 gap-y-4">

                <template x-for="f in currentFields" :key="f.key">
                  <div :class="['textarea','bool','hint-only','multiselect'].includes(f.type) ? 'col-span-2' : 'col-span-1 sm:col-span-1'">

                    <!-- Label -->
                    <label class="flex items-center gap-1 text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                      <span x-text="f.label"></span>
                      <span x-show="f.required" class="text-red-400 text-sm leading-none">*</span>
                    </label>

                    <!-- TEXTAREA ───────────────────── -->
                    <template x-if="f.type==='textarea'">
                      <textarea x-model="modal.data[f.key]" rows="3"
                        :placeholder="f.placeholder || ('أدخل ' + f.label)"
                        :maxlength="f.maxlength || 10000"
                        :required="f.required"
                        class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:border-brand-400 focus:ring-0 outline-none transition-colors resize-y bg-gray-50/80 focus:bg-white placeholder-gray-300"></textarea>
                    </template>

                    <!-- SELECT ────────────────────── -->
                    <template x-if="f.type==='select'">
                      <div class="relative">
                        <select x-model="modal.data[f.key]"
                          class="w-full appearance-none border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:border-brand-400 outline-none transition-colors bg-gray-50/80 focus:bg-white cursor-pointer">
                          <option value="">— اختر —</option>
                          <template x-for="o in statusOptionsFor(f)" :key="o.v">
                            <option :value="o.v" x-text="o.l"></option>
                          </template>
                        </select>
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs">▾</span>
                      </div>
                    </template>

                    <!-- RELATION SELECT ─────────────── -->
                    <template x-if="f.type==='relation'">
                      <div class="relative">
                        <select x-model="modal.data[f.key]"
                          class="w-full appearance-none border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:border-brand-400 outline-none transition-colors bg-gray-50/80 focus:bg-white cursor-pointer">
                          <option value="">— لا شيء —</option>
                          <template x-for="o in (relationOptions[f.relation]||[])" :key="o.id">
                            <option :value="o.id" x-text="(o.code ? o.code + ' — ' : '') + (o.title||o.name||'')"></option>
                          </template>
                        </select>
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs">▾</span>
                      </div>
                    </template>

                    <!-- BOOL TOGGLE ─────────────────── -->
                    <template x-if="f.type==='bool'">
                      <div class="flex items-center gap-3 h-11 px-4 border-2 border-gray-200 rounded-xl bg-gray-50/80">
                        <button type="button" @click="modal.data[f.key] = !modal.data[f.key]"
                          :class="modal.data[f.key] ? 'bg-brand-500' : 'bg-gray-300'"
                          class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 focus:outline-none flex-shrink-0">
                          <span :class="modal.data[f.key] ? '-translate-x-5' : '-translate-x-1'"
                            class="inline-block h-4 w-4 rounded-full bg-white shadow-sm transition-transform duration-200"></span>
                        </button>
                        <span class="text-sm font-medium transition-colors"
                          :class="modal.data[f.key] ? 'text-brand-600' : 'text-gray-400'"
                          x-text="modal.data[f.key] ? 'نعم ✓' : 'لا'"></span>
                      </div>
                    </template>

                    <!-- MULTISELECT (checkboxes array) ─── -->
                    <template x-if="f.type==='multiselect'">
                      <div class="border-2 border-gray-200 rounded-xl px-3 py-2 bg-gray-50/80 max-h-48 overflow-y-auto">
                        <div class="grid grid-cols-2 gap-x-3 gap-y-1.5">
                          <template x-for="o in (f.options||[])" :key="o.v">
                            <label class="flex items-center gap-2 text-sm cursor-pointer hover:bg-white rounded px-2 py-1">
                              <input type="checkbox" :value="o.v"
                                :checked="Array.isArray(modal.data[f.key]) && modal.data[f.key].includes(o.v)"
                                @change="(() => { if (!Array.isArray(modal.data[f.key])) modal.data[f.key] = []; const arr = modal.data[f.key]; const i = arr.indexOf(o.v); if ($event.target.checked && i<0) arr.push(o.v); else if (!$event.target.checked && i>=0) arr.splice(i,1); })()"
                                class="rounded text-brand-500 focus:ring-brand-400" />
                              <span x-text="o.l"></span>
                            </label>
                          </template>
                        </div>
                        <div x-show="!(f.options||[]).length" class="text-xs text-gray-400">لا خيارات</div>
                      </div>
                    </template>

                    <!-- TEXT / NUMBER / DATE ────────── -->
                    <template x-if="!['textarea','select','relation','bool','multiselect'].includes(f.type||'text')">
                      <input :type="f.type||'text'" x-model="modal.data[f.key]"
                        :placeholder="f.placeholder || ('أدخل ' + f.label)"
                        :min="f.min" :max="f.maxToday ? new Date().toISOString().slice(0,10) : f.max" :step="f.step"
                        :maxlength="f.maxlength"
                        :required="f.required"
                        class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:border-brand-400 outline-none transition-colors bg-gray-50/80 focus:bg-white placeholder-gray-300" />
                    </template>

                    <!-- ISO HINT ──────────────────────── -->
                    <div x-show="f.hint"
                      class="mt-2 flex items-start gap-2 text-xs text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-lg px-3 py-2 leading-relaxed">
                      <span class="flex-shrink-0 mt-px">ℹ️</span>
                      <span x-text="f.hint"></span>
                    </div>

                  </div>
                </template>

              </div>

              <!-- ── Footer buttons ───────────────────────────── -->
              <div class="flex gap-3 mt-6 pt-4 border-t border-gray-100">
                <button type="submit"
                  class="flex-1 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white px-5 py-2.5 rounded-xl font-semibold text-sm transition-colors flex items-center justify-center gap-2 shadow-sm shadow-brand-200">
                  <span>💾</span>
                  <span x-text="modal.mode==='edit' ? 'حفظ التعديلات' : 'إضافة السجل'"></span>
                </button>
                <button type="button" @click="tryCloseModal()"
                  class="px-5 py-2.5 rounded-xl font-semibold text-sm border-2 border-gray-200 text-gray-600 hover:bg-gray-50 hover:border-gray-300 transition-colors">
                  إلغاء
                </button>
              </div>
            </form>

          </div>
        </div>
      </main>
    </div>
  </template>

<!-- ═══════════════════════════════════════════════════════════════
     COMMAND PALETTE — بحث موحَّد (Ctrl+K / Cmd+K / F1)
════════════════════════════════════════════════════════════════ -->
<div x-show="palette.open" x-cloak
     @click.self="closePalette()"
     class="fixed inset-0 z-[400] bg-black/40 backdrop-blur-sm flex items-start justify-center pt-[10vh] px-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden ring-1 ring-black/10"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 -translate-y-4 scale-95"
       x-transition:enter-end="opacity-100 translate-y-0 scale-100">
    <!-- Search input -->
    <div class="flex items-center gap-3 px-4 py-3 border-b bg-gradient-to-l from-indigo-50 to-white">
      <span class="text-xl">🔍</span>
      <input id="cmdk-input" type="text"
             x-model="palette.query"
             @keydown="paletteOnKey($event)"
             @input="palette.selectedIdx = 0"
             placeholder="اكتب للقفز إلى أي مكان… (شكوى، NCR، KPI، تقييم مورّد…)"
             class="flex-1 bg-transparent outline-none text-base placeholder:text-gray-400" dir="rtl">
      <kbd class="text-[10px] font-mono bg-gray-100 border border-gray-300 rounded px-1.5 py-0.5 text-gray-500">Esc</kbd>
    </div>
    <!-- Results -->
    <div class="max-h-[55vh] overflow-y-auto">
      <template x-for="(it, idx) in paletteResults()" :key="it.id">
        <div @click="paletteExecute(idx)"
             @mouseenter="palette.selectedIdx = idx"
             :class="palette.selectedIdx===idx ? 'bg-indigo-50 border-r-4 border-indigo-500' : 'border-r-4 border-transparent hover:bg-gray-50'"
             class="flex items-center gap-3 px-4 py-2.5 cursor-pointer transition">
          <span class="text-xl flex-shrink-0" x-text="it.icon"></span>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-gray-800 truncate" x-text="it.label"></div>
            <div class="text-[11px] text-gray-500" x-text="it.hint"></div>
          </div>
          <span :class="it.kind==='action' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-600'"
                class="text-[10px] font-mono rounded px-1.5 py-0.5"
                x-text="it.kind==='action' ? 'إجراء' : 'صفحة'"></span>
        </div>
      </template>
      <div x-show="!paletteResults().length" class="text-center text-gray-400 text-sm py-8">
        <div class="text-3xl mb-2 opacity-50">🔎</div>
        <div>لا توجد نتائج لـ "<span x-text="palette.query"></span>"</div>
      </div>
    </div>
    <!-- Footer hints -->
    <div class="px-4 py-2 border-t bg-gray-50 text-[10px] text-gray-500 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span><kbd class="bg-white border border-gray-300 rounded px-1 font-mono">↑↓</kbd> تنقّل</span>
        <span><kbd class="bg-white border border-gray-300 rounded px-1 font-mono">Enter</kbd> اختيار</span>
        <span><kbd class="bg-white border border-gray-300 rounded px-1 font-mono">Esc</kbd> إغلاق</span>
      </div>
      <div class="flex items-center gap-1">
        <kbd class="bg-white border border-gray-300 rounded px-1 font-mono">Ctrl</kbd>
        <span>+</span>
        <kbd class="bg-white border border-gray-300 rounded px-1 font-mono">K</kbd>
      </div>
    </div>
  </div>
</div>

<!-- ═══ Bulk KPI Import Modal (CSV paste) ═══ -->
<div x-show="bulk.open" x-cloak class="fixed inset-0 bg-black/50 flex items-center justify-center z-[250] p-4"
     @keydown.escape.window="bulk.open=false">
  <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl" @click.outside="bulk.open=false">
    <div class="px-5 py-3 border-b flex items-center justify-between">
      <div class="font-bold">📋 إدخال مُجمَّع لقراءات KPI</div>
      <button @click="closeBulkImport()" class="text-gray-400 hover:text-gray-700 text-xl">✖</button>
    </div>
    <div class="p-5 space-y-3">
      <div class="text-sm text-gray-700">
        الصق قراءات متعدّدة دفعة واحدة — صيغة: <code class="bg-gray-100 px-1 rounded">code,year,month,actualValue[,spent]</code>
      </div>
      <div class="text-xs text-gray-500 bg-gray-50 border rounded p-2 font-mono" dir="ltr">
        OBJ-SAMPLE,2026,3,45<br>
        ACT-SAMPLE,2026,3,120,5000
      </div>
      <textarea x-model="bulk.text" rows="10"
                class="w-full border rounded p-2 text-sm font-mono" dir="ltr"
                placeholder="code,year,month,actualValue[,spent]"></textarea>
      <template x-if="bulk.result">
        <div class="text-xs space-y-1">
          <div class="font-bold text-green-800">✅ نجح: <span x-text="bulk.result.inserted"></span>/<span x-text="bulk.result.total"></span></div>
          <template x-if="bulk.result.failed && bulk.result.failed.length">
            <div>
              <div class="font-bold text-red-700">فشل (<span x-text="bulk.result.failed.length"></span>):</div>
              <ul class="list-disc pr-5 text-red-700">
                <template x-for="(f, i) in bulk.result.failed" :key="i">
                  <li>صف <span x-text="f.row >= 0 ? f.row + 1 : '—'"></span>: <span x-text="f.error"></span></li>
                </template>
              </ul>
            </div>
          </template>
        </div>
      </template>
      <div class="flex gap-2 justify-end pt-2 border-t">
        <button @click="closeBulkImport()" class="px-3 py-1.5 border rounded text-sm">إلغاء</button>
        <button @click="submitBulkImport()" :disabled="bulk.busy"
                class="px-3 py-1.5 bg-violet-600 hover:bg-violet-700 disabled:opacity-50 text-white rounded text-sm">
          <span x-show="!bulk.busy">💾 إدخال الدفعة</span>
          <span x-show="bulk.busy">⏳ جارٍ…</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast container — داخل نطاق x-data="app()" في الـ body -->
<div class="fixed top-4 left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:left-4 z-[300] space-y-2 pointer-events-none w-[calc(100vw-2rem)] md:w-96" x-cloak>
  <template x-for="t in toasts" :key="t.id">
    <div :class="t.type==='error' ? 'bg-red-600 border-red-700' : t.type==='warn' ? 'bg-amber-500 border-amber-600' : 'bg-green-600 border-green-700'"
         class="border text-white px-4 py-3 rounded-xl shadow-2xl text-sm font-medium flex items-start gap-2.5 pointer-events-auto"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-end="opacity-0 translate-y-1">
      <span x-text="t.type==='error' ? '❌' : t.type==='warn' ? '⚠️' : '✅'" class="text-base flex-shrink-0 mt-px"></span>
      <span x-text="t.msg" class="flex-1 leading-snug"></span>
      <button @click="toasts = toasts.filter(x=>x.id!==t.id)" class="opacity-70 hover:opacity-100 flex-shrink-0 text-lg leading-none">✖</button>
    </div>
  </template>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     DIGITAL SIGNATURE MODAL — ISO 9001 §7.1.5.2 (Batch 10/11)
════════════════════════════════════════════════════════════════ -->
<template x-if="user && sigModal">
  <div class="fixed inset-0 bg-black/60 z-[600] flex items-center justify-center p-4" @keydown.escape.window="closeSignatureModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6">
      <div class="mb-3">
        <div class="text-xs text-gray-500">ISO 9001 §7.1.5.2 — توقيع رقمي موثّق</div>
        <h3 class="font-bold text-lg text-gray-900" x-text="'توقيع رقمي: ' + (sigModal?.label || '')"></h3>
        <p class="text-xs text-gray-600 mt-1">ارسم توقيعك في الإطار أدناه باستخدام الماوس أو اللمس. سيُخزَّن مع وقت ومُعرِّف المستخدم.</p>
      </div>
      <div class="border-2 border-dashed border-gray-300 rounded-lg bg-gray-50 p-1">
        <canvas id="sigCanvas" width="500" height="200" class="bg-white rounded w-full touch-none cursor-crosshair" style="max-width:100%;"></canvas>
      </div>
      <template x-if="sigModal?.error">
        <div class="mt-2 text-xs text-red-700 bg-red-50 border border-red-200 rounded px-2 py-1" x-text="sigModal.error"></div>
      </template>
      <div class="flex flex-wrap gap-2 mt-4 justify-end">
        <button type="button" @click="clearSignature()" class="px-3 py-1.5 text-sm bg-gray-200 hover:bg-gray-300 rounded-lg">🗑️ مسح</button>
        <button type="button" @click="closeSignatureModal()" class="px-3 py-1.5 text-sm bg-gray-300 hover:bg-gray-400 rounded-lg">إلغاء</button>
        <button type="button" @click="confirmSignature()" :disabled="sigModal?.busy" class="px-4 py-1.5 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg disabled:opacity-50">
          <span x-show="!sigModal?.busy">✍️ تأكيد التوقيع</span>
          <span x-show="sigModal?.busy">...جاري الحفظ</span>
        </button>
      </div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════════════
     ACK DOCUMENT READ & ACKNOWLEDGE MODAL — لعرض أي وثيقة وإقرارها
════════════════════════════════════════════════════════════════ -->
<template x-if="user && ackReadModal">
  <div class="fixed inset-0 bg-black/70 z-[500] flex items-center justify-center p-4" @keydown.escape.window="closeAckRead()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-l from-teal-700 to-teal-600 text-white px-6 py-4 flex items-center justify-between">
        <div class="flex-1 min-w-0">
          <div class="text-xs opacity-90 mb-0.5">
            <span x-text="ackCategoryLabel(ackReadModal.category)"></span> ·
            <span x-text="ackReadModal.code"></span> ·
            إصدار <span x-text="ackReadModal.version"></span>
          </div>
          <h3 class="font-bold text-lg truncate" x-text="ackReadModal.title"></h3>
        </div>
        <button @click="closeAckRead()" class="text-white/80 hover:text-white text-xl ms-3">✖</button>
      </div>

      <!-- Intro -->
      <div class="bg-amber-50 border-b border-amber-200 px-6 py-3 text-sm text-amber-900">
        <div class="text-xs leading-relaxed">
          📣 يُرجى قراءة النص كاملاً — زر الإقرار سيُفعَّل بعد تمرير النص حتى النهاية وتأكيد الاطّلاع.
        </div>
      </div>

      <!-- Content -->
      <div class="flex-1 overflow-auto px-6 py-4 text-sm text-gray-800 leading-relaxed" @scroll="onAckScroll($event)">
        <div class="prose prose-sm max-w-none whitespace-pre-wrap" x-text="ackReadModal.content || 'لا يوجد نص.'"></div>
        <template x-if="ackReadModal.commitments">
          <div class="mt-6 bg-teal-50 border-r-4 border-teal-500 rounded-lg p-4">
            <div class="font-bold text-teal-900 mb-2">🤝 التعهدات</div>
            <div class="whitespace-pre-wrap text-teal-900 text-sm" x-text="ackReadModal.commitments"></div>
          </div>
        </template>
        <div class="mt-6 text-center text-xs text-gray-400 border-t pt-4">— نهاية الوثيقة —</div>
      </div>

      <!-- Footer: consent + action -->
      <div class="border-t bg-gray-50 px-6 py-4 space-y-3">
        <div class="flex items-center gap-2 text-xs"
             :class="ackScrolledToEnd ? 'text-green-700' : 'text-gray-500'">
          <span x-text="ackScrolledToEnd ? '✅' : '⏳'"></span>
          <span x-text="ackScrolledToEnd ? 'تم الاطّلاع على كامل النص' : 'يرجى تمرير النص حتى النهاية'"></span>
        </div>
        <label class="flex items-start gap-2 text-sm cursor-pointer"
               :class="!ackScrolledToEnd ? 'opacity-50 cursor-not-allowed' : ''">
          <input type="checkbox" x-model="ackConfirmRead" :disabled="!ackScrolledToEnd" class="mt-1 h-4 w-4 accent-teal-600">
          <span class="text-gray-800 leading-relaxed">
            <strong>أُقرّ</strong> بأنني قرأت هذه الوثيقة (<span x-text="ackReadModal.code"></span> — إصدار <span x-text="ackReadModal.version"></span>) وفهمت محتواها،
            <strong>وألتزم</strong> بتطبيق متطلباتها.
          </span>
        </label>
        <div class="flex items-center justify-between gap-3 pt-2">
          <div class="text-xs text-gray-500">سيُسجَّل إقرارك بالتاريخ والوقت وعنوان IP (ISO 7.5.3).</div>
          <div class="flex items-center gap-2">
            <button @click="closeAckRead()" class="text-xs text-gray-600 hover:bg-gray-200 rounded-lg px-3 py-1.5">إغلاق</button>
            <button @click="submitAcknowledge()"
                    :disabled="!ackScrolledToEnd || !ackConfirmRead || ackSubmitting"
                    :class="(ackScrolledToEnd && ackConfirmRead && !ackSubmitting) ? 'bg-teal-600 hover:bg-teal-700' : 'bg-gray-300 cursor-not-allowed'"
                    class="text-white text-sm px-5 py-2 rounded-lg font-bold transition-colors">
              <span x-show="!ackSubmitting">✅ أُقرّ وأوافق</span>
              <span x-show="ackSubmitting">... جارٍ التسجيل</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════════════
     ACK LINKS MODAL — إدارة روابط الإقرار الشخصية (واتساب/SMS/بريد)
════════════════════════════════════════════════════════════════ -->
<template x-if="linksModal">
  <div class="fixed inset-0 bg-black/60 z-[400] flex items-center justify-center p-4" @click.self="closeLinksModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[92vh] flex flex-col overflow-hidden">
      <div class="bg-gradient-to-l from-purple-700 to-indigo-600 text-white px-6 py-4 flex items-center justify-between">
        <div>
          <div class="text-xs opacity-90">📨 روابط الإقرار الشخصية</div>
          <h3 class="font-bold text-lg" x-text="linksModal?.doc?.title"></h3>
          <div class="text-xs opacity-90 mt-1">
            <span x-text="linksModal?.doc?.code"></span> ·
            إصدار <span x-text="linksModal?.doc?.version"></span>
          </div>
        </div>
        <button @click="closeLinksModal()" class="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center">✕</button>
      </div>

      <!-- Tabs -->
      <div class="flex border-b bg-gray-50">
        <button @click="linksModal.tab='internal'"
                :class="linksModal.tab==='internal' ? 'border-b-2 border-purple-600 text-purple-700 bg-white' : 'text-gray-500'"
                class="px-5 py-3 text-sm font-semibold">👤 شخص واحد (موظف/عضو)</button>
        <button @click="linksModal.tab='external'"
                :class="linksModal.tab==='external' ? 'border-b-2 border-purple-600 text-purple-700 bg-white' : 'text-gray-500'"
                class="px-5 py-3 text-sm font-semibold">🌐 طرف خارجي (مستفيد/مورد/متبرع)</button>
        <button @click="linksModal.tab='bulk'"
                :class="linksModal.tab==='bulk' ? 'border-b-2 border-purple-600 text-purple-700 bg-white' : 'text-gray-500'"
                class="px-5 py-3 text-sm font-semibold">👥 دفعة موظفين</button>
      </div>

      <!-- Create form area -->
      <div class="px-6 py-4 bg-gray-50 border-b">
        <!-- Internal single -->
        <template x-if="linksModal.tab==='internal'">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <div>
              <label class="text-xs font-semibold text-gray-600">الموظف / العضو *</label>
              <select x-model="linksModal.form.userId" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="">— اختر —</option>
                <template x-for="u in (relationOptions.users||[])" :key="u.id">
                  <option :value="u.id" x-text="u.name + (u.role ? ' · ' + u.role : '')"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-600">قناة الإرسال</label>
              <select x-model="linksModal.form.sentVia" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="WHATSAPP">واتساب</option><option value="SMS">رسالة نصية</option>
                <option value="EMAIL">بريد إلكتروني</option><option value="MANUAL">يدوياً</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-600">الانتهاء (اختياري)</label>
              <input type="date" x-model="linksModal.form.expiresAt" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white" />
            </div>
            <div class="flex items-end">
              <button @click="createAckLink()" :disabled="linksModal.busy"
                      class="w-full bg-purple-600 hover:bg-purple-700 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-semibold">
                ➕ إنشاء رابط
              </button>
            </div>
          </div>
        </template>

        <!-- External single -->
        <template x-if="linksModal.tab==='external'">
          <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
            <div>
              <label class="text-xs font-semibold text-gray-600">الفئة *</label>
              <select x-model="linksModal.form.externalType" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="BOARD_MEMBER">عضو مجلس</option>
                <option value="GENERAL_ASSEMBLY">جمعية عمومية</option>
                <option value="BENEFICIARY">مستفيد</option>
                <option value="SUPPLIER">مورد</option>
                <option value="DONOR">متبرع</option>
                <option value="VOLUNTEER">متطوع</option>
                <option value="AUDITOR">مدقّق</option>
                <option value="EXTERNAL">أخرى</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-600">الاسم *</label>
              <input x-model="linksModal.form.externalName" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white" placeholder="الاسم الكامل" />
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-600">الجوال / البريد</label>
              <input x-model="linksModal.form.externalContact" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white" placeholder="966555..." />
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-600">القناة</label>
              <select x-model="linksModal.form.sentVia" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="WHATSAPP">واتساب</option><option value="SMS">رسالة</option>
                <option value="EMAIL">بريد</option><option value="MANUAL">يدوي</option>
              </select>
            </div>
            <div class="flex items-end">
              <button @click="createAckLink()" :disabled="linksModal.busy"
                      class="w-full bg-purple-600 hover:bg-purple-700 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-semibold">➕ إنشاء</button>
            </div>
          </div>
        </template>

        <!-- Bulk -->
        <template x-if="linksModal.tab==='bulk'">
          <div>
            <div class="flex gap-2 items-center mb-2">
              <input x-model="linksModal.bulkSearch" placeholder="🔍 بحث عن موظف..." class="flex-1 border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white" />
              <span class="text-xs text-gray-600">المحدَّدون: <b x-text="linksModal.bulkIds.size"></b></span>
              <button @click="createBulkLinks()" :disabled="linksModal.busy || !linksModal.bulkIds.size"
                      class="bg-purple-600 hover:bg-purple-700 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-semibold">
                📨 إنشاء روابط للمحدَّدين
              </button>
            </div>
            <div class="max-h-48 overflow-y-auto border rounded-lg bg-white p-2">
              <template x-for="u in bulkFilteredUsers()" :key="u.id">
                <label class="flex items-center gap-2 text-sm px-2 py-1 hover:bg-purple-50 rounded cursor-pointer">
                  <input type="checkbox" :checked="linksModal.bulkIds.has(u.id)" @change="toggleBulkId(u.id)" class="rounded" />
                  <span x-text="u.name"></span>
                  <span x-show="u.role" class="text-xs text-gray-500" x-text="'· ' + u.role"></span>
                </label>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Links list -->
      <div class="flex-1 overflow-y-auto p-4">
        <div x-show="linksModal.loading" class="text-center text-gray-500 py-6">... جاري التحميل</div>
        <div x-show="!linksModal.loading && !linksModal.items.length" class="text-center text-gray-400 py-10">
          لا توجد روابط بعد — أنشئ رابطاً من الأعلى
        </div>
        <table x-show="linksModal.items.length" class="w-full text-xs">
          <thead class="bg-gray-100 text-right">
            <tr>
              <th class="px-2 py-2">المُخاطَب</th>
              <th class="px-2 py-2">الصفة</th>
              <th class="px-2 py-2">أُنشئ</th>
              <th class="px-2 py-2">أُرسل</th>
              <th class="px-2 py-2">الحالة</th>
              <th class="px-2 py-2">إجراءات</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="tok in linksModal.items" :key="tok.id">
              <tr class="border-t hover:bg-gray-50">
                <td class="px-2 py-2" x-text="tok.user?.name || tok.externalName || '—'"></td>
                <td class="px-2 py-2 text-gray-600" x-text="tok.user?.role || tok.externalType || '—'"></td>
                <td class="px-2 py-2 text-gray-500" x-text="new Date(tok.createdAt).toLocaleDateString('ar-SA')"></td>
                <td class="px-2 py-2 text-gray-500" x-text="tok.sentAt ? new Date(tok.sentAt).toLocaleDateString('ar-SA') + ' · ' + (tok.sentVia||'') : '—'"></td>
                <td class="px-2 py-2">
                  <span x-show="tok.usedAt" class="inline-block bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-[10px] font-semibold">
                    ✅ أقرّ · <span x-text="new Date(tok.usedAt).toLocaleDateString('ar-SA')"></span>
                  </span>
                  <span x-show="!tok.usedAt && tok.expiresAt && new Date(tok.expiresAt) < new Date()" class="inline-block bg-red-100 text-red-700 px-2 py-0.5 rounded-full text-[10px] font-semibold">
                    ⏱️ منتهٍ
                  </span>
                  <span x-show="!tok.usedAt && (!tok.expiresAt || new Date(tok.expiresAt) >= new Date())" class="inline-block bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full text-[10px] font-semibold">
                    ⏳ بانتظار
                  </span>
                </td>
                <td class="px-2 py-2 whitespace-nowrap">
                  <button @click="copyAckLink(tok)" title="نسخ" class="text-blue-600 hover:underline ml-2">📋</button>
                  <button @click="sendViaWhatsApp(tok)" title="فتح واتساب" class="text-green-600 hover:underline ml-2">📱</button>
                  <a :href="ackPublicUrl(tok)" target="_blank" title="معاينة" class="text-indigo-600 hover:underline ml-2">👁️</a>
                  <button x-show="!tok.usedAt" @click="deleteAckLink(tok)" title="حذف" class="text-red-600 hover:underline">🗑️</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <div class="bg-gray-50 border-t px-6 py-3 text-xs text-gray-500">
        💡 الروابط شخصية — كل رابط يُسجِّل الإقرار باسم صاحبه مع IP وتاريخ.
        استخدم "📱" لفتح واتساب ورسالة جاهزة.
      </div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════════════
     POLICY ACKNOWLEDGMENT MODAL — إقرار سياسة الجودة (P-02 §3.4 · ISO 5.2.2(b))
════════════════════════════════════════════════════════════════ -->
<template x-if="user && policyAckModalOpen && policyAck?.hasActivePolicy && !policyAck?.acknowledged">
  <div class="fixed inset-0 bg-black/70 z-[500] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-l from-indigo-700 to-indigo-600 text-white px-6 py-4 flex items-center justify-between">
        <div>
          <div class="text-xs opacity-90 mb-0.5">ISO 9001:2015 §5.2.2(b) · P-02 §3.4</div>
          <h3 class="font-bold text-lg flex items-center gap-2">
            <span>📜</span>
            <span>إقرار الاطّلاع على سياسة الجودة</span>
          </h3>
        </div>
        <div class="text-left text-xs opacity-90">
          <div>إصدار <span class="font-bold" x-text="policyAck?.policy?.version"></span></div>
          <div x-show="policyAck?.policy?.effectiveDate" x-text="policyAck?.policy?.effectiveDate ? 'نافذة منذ ' + new Date(policyAck.policy.effectiveDate).toLocaleDateString('ar-SA') : ''"></div>
        </div>
      </div>

      <!-- Intro -->
      <div class="bg-amber-50 border-b border-amber-200 px-6 py-3 text-sm text-amber-900">
        <div class="font-semibold mb-1">📣 عزيزي الموظف،</div>
        <div class="text-xs leading-relaxed">
          تطلب منك المنظمة (جمعية البر بصبيا) الاطّلاع على سياسة الجودة السارية وفهم التزاماتها.
          اقرأ المحتوى بتمعّن حتى النهاية، ثم أكّد بأنك قرأته وفهمته وتلتزم بتطبيقه في عملك اليومي.
        </div>
      </div>

      <!-- Policy Content (scrollable) -->
      <div class="flex-1 overflow-auto px-6 py-4 text-sm text-gray-800 leading-relaxed"
           @scroll="onPolicyAckScroll($event)">
        <h2 class="text-xl font-bold text-indigo-900 mb-2" x-text="policyAck?.policy?.title"></h2>
        <div class="text-xs text-gray-500 mb-4">
          <span x-show="policyAck?.policy?.approvedBy">اعتماد: <span x-text="policyAck?.policy?.approvedBy"></span> · </span>
          <span x-show="policyAck?.policy?.approvedAt" x-text="policyAck?.policy?.approvedAt ? 'بتاريخ ' + new Date(policyAck.policy.approvedAt).toLocaleDateString('ar-SA') : ''"></span>
        </div>

        <div class="prose prose-sm max-w-none whitespace-pre-wrap" x-text="policyAck?.policy?.content || 'لا يوجد نص للسياسة.'"></div>

        <template x-if="policyAck?.policy?.commitments">
          <div class="mt-6 bg-indigo-50 border-r-4 border-indigo-500 rounded-lg p-4">
            <div class="font-bold text-indigo-900 mb-2">🤝 التعهدات والالتزامات</div>
            <div class="whitespace-pre-wrap text-indigo-900 text-sm" x-text="policyAck?.policy?.commitments"></div>
          </div>
        </template>

        <div class="mt-6 text-center text-xs text-gray-400 border-t pt-4">
          — نهاية وثيقة السياسة —
        </div>
      </div>

      <!-- Read indicator + Checkbox + Actions -->
      <div class="border-t bg-gray-50 px-6 py-4 space-y-3">
        <div class="flex items-center gap-2 text-xs"
             :class="policyAckScrolledToEnd ? 'text-green-700' : 'text-gray-500'">
          <span x-text="policyAckScrolledToEnd ? '✅' : '⏳'"></span>
          <span x-text="policyAckScrolledToEnd ? 'تم الاطّلاع على كامل نص السياسة' : 'يرجى تمرير النص حتى النهاية لتفعيل زر الإقرار'"></span>
        </div>

        <label class="flex items-start gap-2 text-sm cursor-pointer"
               :class="!policyAckScrolledToEnd ? 'opacity-50 cursor-not-allowed' : ''">
          <input type="checkbox"
                 x-model="policyAckConfirmRead"
                 :disabled="!policyAckScrolledToEnd"
                 class="mt-1 h-4 w-4 accent-indigo-600">
          <span class="text-gray-800 leading-relaxed">
            <strong>أقرّ</strong> بأنني قرأت سياسة الجودة (إصدار <span x-text="policyAck?.policy?.version"></span>) وفهمت محتواها،
            <strong>وألتزم</strong> بتطبيق متطلباتها في أداء مهامي اليومية، وبالمشاركة في جهود تحسين نظام إدارة الجودة.
          </span>
        </label>

        <div class="flex items-center justify-between gap-3 pt-2">
          <div class="text-xs text-gray-500">
            سيُسجَّل إقرارك بالتاريخ والوقت وعنوان IP للتوثيق (ISO 7.5.3).
          </div>
          <div class="flex items-center gap-2">
            <button @click="policyAckModalOpen=false"
                    class="text-xs text-gray-600 hover:bg-gray-200 rounded-lg px-3 py-1.5">
              تأجيل
            </button>
            <button @click="acknowledgePolicy()"
                    :disabled="!policyAckScrolledToEnd || !policyAckConfirmRead || policyAckSubmitting"
                    :class="(policyAckScrolledToEnd && policyAckConfirmRead && !policyAckSubmitting) ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-gray-300 cursor-not-allowed'"
                    class="text-white text-sm px-5 py-2 rounded-lg font-bold transition-colors">
              <span x-show="!policyAckSubmitting">✅ أُقرّ وأوافق</span>
              <span x-show="policyAckSubmitting">... جارٍ التسجيل</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════════════
     SETUP WIZARD — مساعد البداية (ISO 9001 Quick Start)
════════════════════════════════════════════════════════════════ -->
<template x-if="user && wizard.open">
  <div class="fixed inset-0 bg-black/60 z-[400] flex items-center justify-center p-4" @click.self="closeWizard()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden" @click.stop>
      <!-- Header -->
      <div class="bg-gradient-to-l from-indigo-600 to-indigo-500 text-white px-6 py-4 flex items-center justify-between">
        <div>
          <div class="text-xs opacity-80 mb-0.5">ISO 9001:2015 Quick Start</div>
          <h3 class="font-bold text-lg">🧭 دليل إعداد نظام الجودة</h3>
        </div>
        <button @click="closeWizard()" class="text-white/70 hover:text-white text-xl">✖</button>
      </div>

      <!-- Progress bar -->
      <div class="px-6 pt-4">
        <div class="flex items-center justify-between text-xs text-gray-500 mb-2">
          <span x-text="`الخطوة ${wizard.step + 1} من ${wizardSteps.length}`"></span>
          <span x-text="`${Math.round(((wizard.step) / wizardSteps.length) * 100)}% مكتمل`"></span>
        </div>
        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-full bg-indigo-500 rounded-full transition-all duration-500"
               :style="`width: ${(wizard.step / wizardSteps.length) * 100}%`"></div>
        </div>
      </div>

      <!-- Step content -->
      <template x-if="wizard.step < wizardSteps.length">
        <div class="px-6 py-5">
          <div class="flex items-start gap-4">
            <div class="w-14 h-14 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-center text-3xl flex-shrink-0"
                 x-text="wizardSteps[wizard.step].icon"></div>
            <div class="flex-1">
              <div class="text-xs font-bold text-indigo-500 mb-1" x-text="wizardSteps[wizard.step].iso"></div>
              <h4 class="text-lg font-bold text-gray-800 mb-2" x-text="wizardSteps[wizard.step].title"></h4>
              <p class="text-sm text-gray-600 leading-relaxed" x-text="wizardSteps[wizard.step].desc"></p>
            </div>
          </div>

          <!-- Step indicators -->
          <div class="flex gap-2 mt-5 mb-1">
            <template x-for="(s, i) in wizardSteps" :key="i">
              <div :class="i < wizard.step ? 'bg-indigo-500' : i === wizard.step ? 'bg-indigo-300' : 'bg-gray-200'"
                   class="flex-1 h-1.5 rounded-full transition-all duration-300" :title="s.title"></div>
            </template>
          </div>

          <div class="flex gap-2 mt-4">
            <button @click="wizardGoto(wizardSteps[wizard.step].page)"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition-colors flex items-center justify-center gap-2">
              <span>اذهب إلى</span>
              <span x-text="wizardSteps[wizard.step].title"></span>
              <span>←</span>
            </button>
            <button @click="wizard.step < wizardSteps.length - 1 ? wizard.step++ : closeWizard()"
                    class="px-4 py-2.5 border rounded-xl text-gray-600 hover:bg-gray-50 text-sm">
              <span x-text="wizard.step < wizardSteps.length - 1 ? 'التالي ←' : 'إنهاء ✓'"></span>
            </button>
          </div>
        </div>
      </template>

      <!-- Done screen -->
      <template x-if="wizard.step >= wizardSteps.length">
        <div class="px-6 py-8 text-center">
          <div class="text-5xl mb-4">🎉</div>
          <h4 class="text-xl font-bold text-gray-800 mb-2">النظام جاهز للعمل!</h4>
          <p class="text-sm text-gray-500 mb-6">يمكنك دائماً العودة لهذا الدليل من زر "🧭 دليل البداية" في أعلى الشاشة</p>
          <button @click="closeWizard()"
                  class="bg-green-600 hover:bg-green-700 text-white font-semibold px-8 py-2.5 rounded-xl transition-colors">
            ابدأ العمل ✓
          </button>
        </div>
      </template>

      <!-- Footer -->
      <div class="px-6 py-3 bg-gray-50 border-t flex items-center justify-between text-xs text-gray-400">
        <span>ISO 9001:2015 — جمعية البر بصبيا</span>
        <button @click="closeWizard()" class="hover:text-gray-600">تخطّي الدليل</button>
      </div>
    </div>
  </div>
</template>

<script src="/modules/i18n.js?v=2026-04-19g"></script>

<script src="/modules/kpi-quickentry.js?v=2026-04-19g"></script>
