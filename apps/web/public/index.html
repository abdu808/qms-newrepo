<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نظام إدارة الجودة - جمعية البر بصبيا</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🕊️%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!--
  Safelist for Tailwind Play CDN — ensures dynamic group colors are generated
  hidden: bg-slate-50 bg-sky-50 bg-violet-50 bg-teal-50 bg-emerald-50 bg-amber-50 bg-rose-50 bg-gray-50
  hidden: text-slate-700 text-sky-700 text-violet-700 text-teal-700 text-emerald-700 text-amber-700 text-rose-700 text-gray-600
  hidden: border-slate-300 border-sky-300 border-violet-300 border-teal-300 border-emerald-300 border-amber-300 border-rose-300 border-gray-300
  hidden: border-slate-200 border-sky-200 border-violet-200 border-teal-200 border-emerald-200 border-amber-200 border-rose-200 border-gray-200
  hidden: bg-slate-400 bg-sky-400 bg-violet-400 bg-teal-400 bg-emerald-400 bg-amber-400 bg-rose-400 bg-gray-400
  hidden: bg-slate-100 bg-sky-100 bg-violet-100 bg-teal-100 bg-emerald-100 bg-amber-100 bg-rose-100 bg-gray-100
-->
<div class="hidden bg-slate-50 bg-sky-50 bg-violet-50 bg-teal-50 bg-emerald-50 bg-amber-50 bg-rose-50 bg-gray-50 text-slate-700 text-sky-700 text-violet-700 text-teal-700 text-emerald-700 text-amber-700 text-rose-700 text-gray-600 border-slate-300 border-sky-300 border-violet-300 border-teal-300 border-emerald-300 border-amber-300 border-rose-300 border-gray-300 border-slate-200 border-sky-200 border-violet-200 border-teal-200 border-emerald-200 border-amber-200 border-rose-200 border-gray-200 bg-slate-400 bg-sky-400 bg-violet-400 bg-teal-400 bg-emerald-400 bg-amber-400 bg-rose-400 bg-gray-400 bg-slate-100 bg-sky-100 bg-violet-100 bg-teal-100 bg-emerald-100 bg-amber-100 bg-rose-100 bg-gray-100"></div>
<link rel="stylesheet" href="/styles.css?v=modal-2026-04-18">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Noto Kufi Arabic', 'system-ui', 'sans-serif'] },
        colors: {
          brand:   { 50:'#f0f9f4', 100:'#dcf2e3', 500:'#2e8b57', 600:'#206d43', 700:'#1a5a38' },
        }
      }
    }
  }
</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="app()" x-init="init()">

  <!-- LOGIN -->
  <template x-if="!user">
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-50 to-brand-100 p-6">
      <form @submit.prevent="login()" class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md border">
        <div class="text-center mb-6">
          <div class="inline-flex items-center justify-center w-16 h-16 bg-brand-500 text-white rounded-full mb-3 text-3xl">🕊️</div>
          <h1 class="text-2xl font-bold text-brand-700">نظام إدارة الجودة</h1>
          <p class="text-sm text-gray-500 mt-1">جمعية البر بمحافظة صبيا</p>
          <p class="text-xs text-gray-400 mt-1">ISO 9001:2015</p>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
            <input type="email" x-model="loginForm.email" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">كلمة المرور</label>
            <input type="password" x-model="loginForm.password" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
          </div>
          <button type="submit" :disabled="loading" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-lg transition disabled:opacity-50">
            <span x-show="!loading">تسجيل الدخول</span>
            <span x-show="loading">جاري التحقق...</span>
          </button>
          <div x-show="loginError" x-text="loginError" class="text-sm text-red-600 bg-red-50 border border-red-200 rounded p-2"></div>
        </div>
        <div class="text-xs text-gray-400 text-center mt-6">© 2026 جمعية البر بصبيا</div>
      </form>
    </div>
  </template>

  <!-- APP SHELL -->
  <template x-if="user">
    <div class="min-h-screen bg-gradient-to-bl from-gray-100 to-gray-200" x-data="{ sidebarOpen: false }">
      <!-- MOBILE OVERLAY -->
      <div x-show="sidebarOpen" x-cloak @click="sidebarOpen=false"
           class="fixed inset-0 bg-black/40 z-30 md:hidden"></div>

      <!-- SIDEBAR (floating card — visually separated from body) -->
      <aside :class="sidebarOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'"
             class="fixed top-4 right-4 bottom-4 w-72 bg-white rounded-2xl shadow-xl ring-1 ring-black/5 flex flex-col z-40 transition-transform duration-200 md:transition-none overflow-hidden">
        <div class="p-4 bg-gradient-to-l from-brand-600 to-brand-500 text-white flex items-center justify-between flex-shrink-0">
          <div class="flex items-center gap-2">
            <span class="text-2xl">🕊️</span>
            <div>
              <div class="font-bold">نظام الجودة</div>
              <div class="text-xs opacity-80">جمعية البر بصبيا</div>
            </div>
          </div>
          <button @click="sidebarOpen=false" class="md:hidden text-white text-xl">✖</button>
        </div>
        <!-- ─── Sidebar search ─── -->
        <div class="px-2.5 pt-2 pb-1 border-b bg-white flex-shrink-0">
          <div class="relative">
            <input type="text" x-model="sidebarSearch" placeholder="🔎 ابحث في القوائم..."
                   class="w-full text-xs bg-gray-50 border border-gray-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-brand-300 focus:bg-white" />
            <button x-show="sidebarSearch" @click="sidebarSearch=''" class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-xs">✕</button>
          </div>
        </div>

        <nav class="flex-1 p-2 overflow-y-auto text-sm space-y-3">

          <!-- ═══ ⭐ المفضلة ═══ -->
          <template x-if="favoriteItems().length">
            <div class="rounded-xl bg-gradient-to-bl from-amber-50 to-orange-50 border border-amber-200 p-2">
              <div class="flex items-center gap-1.5 px-1 pb-1.5 mb-1 border-b border-amber-200/70">
                <div class="w-5 h-5 rounded-md bg-amber-400 text-white flex items-center justify-center text-xs shadow-sm">⭐</div>
                <span class="text-[11px] font-bold text-amber-700 tracking-wider">المفضلة</span>
                <span class="text-[10px] text-amber-500 font-semibold mr-auto" x-text="favoriteItems().length"></span>
              </div>
              <template x-for="id in favoriteItems()" :key="'fav-'+id">
                <div @click="goto(id); sidebarOpen=false" role="button" tabindex="0"
                     @keydown.enter="goto(id); sidebarOpen=false"
                     :class="page===id ? 'bg-brand-500 text-white font-semibold shadow-md' : 'hover:bg-amber-100/60 text-gray-700'"
                     class="group w-full cursor-pointer text-right px-2 py-1.5 rounded-lg flex items-center gap-2 transition">
                  <span x-text="getMenuItem(id)?.icon" class="flex-shrink-0 text-sm"></span>
                  <span x-text="getMenuItem(id)?.label" class="flex-1 truncate text-[13px]"></span>
                  <template x-if="badgeFor(id)">
                    <span :class="[page===id ? 'bg-white/25 text-white border-white/40' : badgeClass(badgeFor(id).tone)]"
                          class="text-[10px] font-bold border rounded-full px-1.5 min-w-[22px] text-center leading-tight" x-text="badgeFor(id).count"></span>
                  </template>
                  <span @click="toggleFavorite(id, $event)"
                        :class="page===id ? 'text-white/90 hover:text-white' : 'text-amber-400 hover:text-amber-500'"
                        class="text-sm cursor-pointer select-none" title="إزالة من المفضلة">★</span>
                </div>
              </template>
            </div>
          </template>

          <!-- ═══ المجموعات الرئيسية (تُفلتَر في الوضع الموجَّه) ═══ -->
          <template x-for="group in visibleMenuGroups()" :key="group.id">
            <div x-show="groupVisibleItems(group).length || !sidebarSearch"
                 :class="groupTheme(group.color).border"
                 class="rounded-xl border bg-white overflow-hidden shadow-sm">

              <!-- ══ رأس المجموعة (Header) ══ -->
              <button @click="toggleGroup(group.id)"
                      :class="[groupTheme(group.color).bg, groupTheme(group.color).text]"
                      class="w-full flex items-center gap-2 px-2.5 py-2 hover:brightness-95 transition group">
                <!-- أيقونة دائرية ملونة -->
                <div :class="groupTheme(group.color).dot"
                     class="w-6 h-6 rounded-lg text-white flex items-center justify-center text-[13px] shadow-sm flex-shrink-0"
                     x-text="group.icon"></div>
                <div class="flex-1 text-right leading-tight">
                  <div class="text-[12px] font-bold" x-text="group.title"></div>
                  <div class="text-[9px] font-mono opacity-60" x-show="group.iso && isAdvanced()" x-text="group.iso"></div>
                </div>
                <!-- عدد العناصر -->
                <span class="text-[10px] font-mono opacity-60 bg-white/60 rounded-full px-1.5" x-text="group.items.length"></span>
                <!-- سهم الطي -->
                <span class="text-[10px] transition-transform w-3 text-center"
                      :class="isGroupCollapsed(group.id) ? '' : 'rotate-90'">◂</span>
              </button>

              <!-- ══ العناصر الفرعية (Sub-items) ══ -->
              <div x-show="!isGroupCollapsed(group.id) || sidebarSearch"
                   x-transition:enter="transition ease-out duration-150"
                   x-transition:enter-start="opacity-0 max-h-0"
                   x-transition:enter-end="opacity-100"
                   class="py-1 px-1 bg-white">

                <!-- خط عمودي ملوّن كعلامة هرمية -->
                <div class="relative pr-2">
                  <div :class="groupTheme(group.color).dot"
                       class="absolute top-1 bottom-1 right-3 w-[2px] rounded-full opacity-40"></div>

                  <template x-for="id in groupVisibleItems(group)" :key="group.id+'-'+id">
                    <div @click="goto(id); sidebarOpen=false" role="button" tabindex="0"
                         @keydown.enter="goto(id); sidebarOpen=false"
                         :class="page===id ? 'bg-brand-500 text-white font-semibold shadow-md ring-1 ring-brand-300' : 'hover:bg-gray-50 text-gray-700'"
                         class="group/item relative w-full cursor-pointer text-right pr-5 pl-2 py-1.5 rounded-lg mb-0.5 flex items-center gap-2 transition">

                      <!-- نقطة اتصال بالخط الجانبي -->
                      <div :class="page===id ? 'bg-white' : groupTheme(group.color).dot"
                           class="absolute right-2 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full z-10"></div>

                      <span x-text="getMenuItem(id)?.icon" class="flex-shrink-0 text-sm"></span>
                      <span x-text="getMenuItem(id)?.label" class="flex-1 truncate text-[13px]"></span>

                      <!-- Badge -->
                      <template x-if="badgeFor(id)">
                        <span :class="[page===id ? 'bg-white/25 text-white border-white/40' : badgeClass(badgeFor(id).tone)]"
                              class="text-[10px] font-bold border rounded-full px-1.5 min-w-[22px] text-center leading-tight"
                              x-text="badgeFor(id).count"></span>
                      </template>

                      <!-- Favorite star -->
                      <span @click="toggleFavorite(id, $event)"
                            :class="page===id
                              ? 'text-white/80 hover:text-white opacity-100'
                              : (isFavorite(id) ? 'text-amber-400 opacity-100' : 'text-gray-300 hover:text-amber-400 opacity-0 group-hover/item:opacity-100')"
                            class="text-xs cursor-pointer select-none transition"
                            x-text="isFavorite(id) ? '★' : '☆'"
                            :title="isFavorite(id) ? 'إزالة من المفضلة' : 'إضافة للمفضلة'"></span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- No search results -->
          <div x-show="sidebarSearch && !favoriteItems().length && !visibleMenuGroups().some(g => groupVisibleItems(g).length)"
               class="text-center text-gray-400 text-xs py-6">
            <div class="text-3xl mb-2 opacity-60">🔎</div>
            <div class="font-medium">لا توجد نتائج</div>
            <div class="text-[10px] mt-1">جرّب كلمات أخرى</div>
          </div>
        </nav>
        <div class="p-3 border-t text-xs bg-gray-50 flex-shrink-0">
          <div class="font-semibold" x-text="user.name"></div>
          <div class="text-gray-500" x-text="roleLabel(user.role)"></div>
          <!-- اختصارات لوحة المفاتيح -->
          <details class="mt-2 group">
            <summary class="cursor-pointer text-gray-500 hover:text-brand-600 select-none flex items-center gap-1 text-[11px]">
              <span>⌨️</span><span>اختصارات سريعة</span>
            </summary>
            <div class="mt-1.5 space-y-1 text-[11px] text-gray-600 bg-white rounded p-2 border">
              <div class="flex justify-between"><span>⚡ القفز لأي مكان</span><kbd class="bg-indigo-100 border border-indigo-300 rounded px-1.5 text-[10px] font-mono text-indigo-700">Ctrl + K</kbd></div>
              <div class="flex justify-between"><span>البحث السريع</span><kbd class="bg-gray-100 border border-gray-300 rounded px-1.5 text-[10px] font-mono">/</kbd></div>
              <div class="flex justify-between"><span>إضافة جديد</span><kbd class="bg-gray-100 border border-gray-300 rounded px-1.5 text-[10px] font-mono">Ctrl + N</kbd></div>
              <div class="flex justify-between"><span>إغلاق النافذة</span><kbd class="bg-gray-100 border border-gray-300 rounded px-1.5 text-[10px] font-mono">Esc</kbd></div>
            </div>
          </details>
          <!-- تبديل وضع الواجهة (Guided / Advanced) — ISO 7.2 قابلية الاستخدام -->
          <button @click="toggleUiMode()"
                  :title="isGuided() ? 'وضع موجَّه: مهامك اليومية فقط' : 'وضع متقدّم: وصول كامل للوحدات'"
                  class="mt-2 w-full rounded px-2 py-1.5 text-[11px] font-medium border transition flex items-center justify-center gap-1.5"
                  :class="isGuided() ? 'bg-teal-50 border-teal-200 text-teal-700 hover:bg-teal-100' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'">
            <span x-text="isGuided() ? '🧭' : '⚙️'"></span>
            <span x-text="isGuided() ? 'الوضع الموجَّه — تبديل للمتقدّم' : 'الوضع المتقدّم — تبديل للموجَّه'"></span>
          </button>
          <button @click="logout()" class="mt-2 w-full text-red-600 hover:bg-red-50 rounded px-2 py-1">تسجيل الخروج</button>
        </div>
      </aside>

      <!-- MAIN (offset by sidebar width + gap; scrolls independently) -->
      <main class="md:mr-[19rem] md:ml-4 md:py-4 min-h-screen flex flex-col">
        <header class="bg-white rounded-2xl shadow-sm ring-1 ring-black/5 mx-4 md:mx-0 mt-4 md:mt-0 px-4 md:px-6 py-3 flex items-center justify-between sticky top-4 z-20">
          <div class="flex items-center gap-3">
            <button @click="sidebarOpen=true" class="md:hidden text-2xl text-brand-600 hover:bg-gray-100 rounded p-1" aria-label="فتح القائمة">☰</button>
            <h2 class="text-lg font-bold" x-text="menu.find(m=>m.id===page)?.label || 'لوحة المعلومات'"></h2>
          </div>
          <div class="flex items-center gap-2">
            <!-- Command Palette trigger — مرئي لتعليم المستخدم بالاختصار -->
            <button @click="openPalette()"
                    title="القفز لأي مكان (Ctrl+K)"
                    class="hidden md:flex items-center gap-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg border border-gray-200 hover:border-indigo-200 px-3 py-1.5 transition">
              <span class="text-base">🔍</span>
              <span class="text-xs text-gray-400">اكتب للقفز…</span>
              <kbd class="text-[9px] font-mono bg-gray-100 border border-gray-300 rounded px-1 text-gray-500">⌘K</kbd>
            </button>

            <!-- ISO 9.1.3: لقطة صحة النظام الحيّة — للمديرين فقط -->
            <div x-show="canSeeAlerts()" x-cloak class="relative" x-data @click.outside="liveAlertsOpen=false">
              <button @click="toggleLiveAlerts()" class="relative text-gray-600 hover:bg-gray-100 rounded-lg p-2"
                      :title="'تنبيهات حيّة: ' + liveAlertsSummary.total">
                <span class="text-xl">🩺</span>
                <span x-show="liveAlertsSummary.danger > 0" x-cloak
                      class="absolute -top-1 -left-1 bg-red-600 text-white text-[10px] rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1 font-bold"
                      x-text="liveAlertsSummary.danger"></span>
                <span x-show="!liveAlertsSummary.danger && liveAlertsSummary.warn > 0" x-cloak
                      class="absolute -top-1 -left-1 bg-amber-500 text-white text-[10px] rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1 font-bold"
                      x-text="liveAlertsSummary.warn"></span>
              </button>
              <div x-show="liveAlertsOpen" x-cloak
                   class="absolute left-0 mt-2 w-[28rem] max-w-[95vw] max-h-[75vh] overflow-auto bg-white rounded-xl shadow-xl ring-1 ring-black/10 z-30">
                <div class="px-4 py-2 border-b flex items-center justify-between bg-gray-50 rounded-t-xl">
                  <div class="font-semibold text-sm">🩺 صحة النظام — لقطة حيّة</div>
                  <div class="text-[10px] text-gray-500">ISO 9.1.3</div>
                </div>
                <div x-show="!liveAlerts.length" class="px-4 py-10 text-center text-sm text-gray-400">
                  ✅ لا توجد تنبيهات — كل المؤشرات خضراء
                </div>
                <template x-for="a in liveAlerts" :key="a.key">
                  <div @click="goToAlert(a)"
                       :class="alertSeverityClass(a.severity)"
                       class="px-4 py-3 border-b border-gray-100 cursor-pointer hover:brightness-95">
                    <div class="flex items-start gap-2">
                      <span x-text="alertSeverityIcon(a.severity)" class="text-base"></span>
                      <div class="flex-1">
                        <div class="text-sm font-semibold flex items-center gap-2">
                          <span x-text="a.title"></span>
                          <span class="bg-white/60 text-[10px] rounded px-1.5 py-0.5 font-mono" x-text="'ISO ' + a.iso"></span>
                        </div>
                        <div class="text-xs mt-1" x-text="a.message"></div>
                        <div class="text-[10px] mt-1 opacity-70" x-show="a.count > 0">
                          عدد السجلات: <strong x-text="a.count"></strong>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- P-06 · ISO 7.4: قناة إشعارات داخلية -->
            <div class="relative" x-data @click.outside="notifOpen=false">
              <button @click="toggleNotifications()" class="relative text-gray-600 hover:bg-gray-100 rounded-lg p-2" title="الإشعارات">
                <span class="text-xl">🔔</span>
                <span x-show="notifUnread > 0" x-cloak
                      class="absolute -top-1 -left-1 bg-red-600 text-white text-[10px] rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1 font-bold"
                      x-text="notifUnread > 99 ? '99+' : notifUnread"></span>
              </button>
              <div x-show="notifOpen" x-cloak
                   class="absolute left-0 mt-2 w-96 max-h-[70vh] overflow-auto bg-white rounded-xl shadow-xl ring-1 ring-black/10 z-30">
                <div class="px-4 py-2 border-b flex items-center justify-between bg-gray-50 rounded-t-xl">
                  <div class="font-semibold text-sm">الإشعارات</div>
                  <button x-show="notifUnread>0" @click="readAllNotifications()" class="text-xs text-indigo-600 hover:underline">قراءة الكل</button>
                </div>
                <div x-show="!notifications.length" class="px-4 py-8 text-center text-sm text-gray-400">📭 لا توجد إشعارات</div>
                <template x-for="n in notifications" :key="n.id">
                  <div @click="openNotification(n)"
                       :class="n.readAt ? 'bg-white' : 'bg-indigo-50/60'"
                       class="px-4 py-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50">
                    <div class="text-sm font-medium" x-text="n.title"></div>
                    <div class="text-xs text-gray-600 mt-1" x-text="n.message"></div>
                    <div class="text-[10px] text-gray-400 mt-1" x-text="new Date(n.createdAt).toLocaleString('ar-SA')"></div>
                  </div>
                </template>
              </div>
            </div>
            <button @click="showWizard()" title="دليل البداية" class="text-indigo-500 hover:bg-indigo-50 rounded-lg px-2 py-1 text-xs font-medium hidden md:flex items-center gap-1 border border-indigo-200">
              🧭 <span>دليل البداية</span>
            </button>
            <div class="text-xs text-gray-500" x-text="today()"></div>
          </div>
        </header>

        <!-- إطار الإقرارات الموحَّد: شريط للوثائق المعلَّقة (سياسات، مواثيق، إقرارات) -->
        <div x-show="(myAcks?.pendingCount || 0) > 0" x-cloak class="mx-4 md:mx-0 mt-3">
          <div class="bg-teal-50 border border-teal-300 rounded-xl px-4 py-3 flex items-center justify-between gap-3 shadow-sm">
            <div class="flex items-center gap-3 text-sm text-teal-900">
              <span class="text-xl">📋</span>
              <div>
                <div class="font-semibold">
                  لديك <strong x-text="myAcks?.pendingCount"></strong>
                  وثيقة تحتاج إقرارك (سياسات/مواثيق)
                </div>

                  <span x-text="a.msg"></span>
                </div>
              </template>
            </div>

            <!-- 🩺 ماذا يحتاج انتباهك؟ — لقطة حيّة (QM+ فقط) — ISO 9.1.3 -->

              <div class="flex items-center justify-between mb-2">
                <h3 class="text-sm font-bold text-gray-700 flex items-center gap-2">
                  <span>🩺</span>
                  <span>ماذا يحتاج انتباهك الآن؟</span>
                  <span class="bg-gray-200 text-gray-700 text-[10px] rounded-full px-2 py-0.5 font-mono" x-text="liveAlertsSummary.total"></span>

              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <template x-for="a in liveAlerts" :key="a.key">
                  <div @click="goToAlert(a)"

                      <span class="bg-white/80 text-[11px] rounded-full w-6 h-6 flex items-center justify-center font-bold" x-text="a.count"></span>
                    </div>
                    <div class="text-xs" x-text="a.message"></div>

            <!-- Empty state عند غياب التنبيهات (QM+) -->
            <div x-show="canSeeAlerts() && !liveAlerts.length && dashKpis" x-cloak

              </div>

            <!-- المراجعة الإدارية القادمة -->
            <div x-show="dashNextReview" class="mb-4 bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 flex items-center gap-3 shadow-sm">

              <div>

            <!-- بطاقات KPI الرئيسية -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <template x-for="card in dashCards" :key="card.label">
                <div :class="[card.bg, card.border]" class="rounded-2xl border p-4 shadow-sm hover:shadow-md transition-shadow">

                    <span class="text-xl" x-text="card.icon"></span>
                    <div class="text-2xl font-black" :class="card.val" x-text="card.value"></div>
                  </div>
                  <div class="text-xs font-semibold text-gray-700" x-text="card.label"></div>
                  <div class="text-xs text-gray-500 mt-0.5" x-text="card.sub"></div>
                </div>
              </template>
            </div>

            <!-- الصف الثاني: توزيع المخاطر + آخر النشاطات -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">

              <!-- توزيع المخاطر — أشرطة أفقية نظيفة (بدلاً من المخطط الدائري) -->
              <div class="bg-white rounded-2xl border shadow-sm p-4">

                  <h3 class="font-bold text-gray-700 text-sm">⚠️ توزيع المخاطر النشطة</h3>

                <div x-show="!dashKpis?.risks?.totalActive" class="text-center text-gray-400 py-8 text-sm">

                <template x-if="dashKpis?.risks?.totalActive > 0">
                  <div>
                    <div class="text-xs text-gray-500 mb-3">

                    </div>
                    <div class="space-y-2.5">
                      <template x-for="lvl in [
                        { key:'حرج',    color:'bg-red-500',    text:'text-red-700',    bg:'bg-red-50',    icon:'🔴' },
                        { key:'مرتفع',  color:'bg-orange-500', text:'text-orange-700', bg:'bg-orange-50', icon:'🟠' },
                        { key:'متوسط',  color:'bg-yellow-400', text:'text-yellow-700', bg:'bg-yellow-50', icon:'🟡' },
                        { key:'منخفض',  color:'bg-green-500',  text:'text-green-700',  bg:'bg-green-50',  icon:'🟢' }
                      ]" :key="lvl.key">
                        <div>
                          <div class="flex items-center justify-between text-xs mb-1">
                            <span class="font-medium" :class="lvl.text">
                              <span x-text="lvl.icon"></span>
                              <span x-text="lvl.key"></span>
                            </span>
                            <span class="text-gray-600">
                              <span class="font-bold" x-text="dashKpis?.risks?.byCriticality?.[lvl.key] || 0"></span>
                              <span class="text-gray-400 mx-1">/</span>
                              <span x-text="((dashKpis?.risks?.byCriticality?.[lvl.key] || 0) * 100 / Math.max(1, dashKpis?.risks?.totalActive || 1)).toFixed(0) + '%'"></span>
                            </span>
                          </div>
                          <div class="h-2.5 rounded-full overflow-hidden" :class="lvl.bg">
                            <div class="h-full rounded-full transition-all duration-500"
                                 :class="lvl.color"
                                 :style="'width:' + ((dashKpis?.risks?.byCriticality?.[lvl.key] || 0) * 100 / Math.max(1, dashKpis?.risks?.totalActive || 1)) + '%'"></div>
                          </div>
                        </div>
                      </template>
                    </div>

                    <!-- بطاقة تنبيه للمخاطر الحرجة + المرتفعة -->
                    <template x-if="(dashKpis?.risks?.byCriticality?.['حرج'] || 0) + (dashKpis?.risks?.byCriticality?.['مرتفع'] || 0) > 0">
                      <div class="mt-4 bg-red-50 border border-red-200 rounded-lg px-3 py-2 flex items-center gap-2 text-xs text-red-800">
                        <span class="text-base">🚨</span>
                        <span>
                          <strong x-text="(dashKpis?.risks?.byCriticality?.['حرج'] || 0) + (dashKpis?.risks?.byCriticality?.['مرتفع'] || 0)"></strong>
                          خطراً يتطلب معالجة عاجلة
                        </span>
                      </div>
                    </template>
                  </div>
                </template>
              </div>

              <!-- آخر النشاطات -->
              <div class="bg-white rounded-2xl border shadow-sm p-4 overflow-hidden">
                <h3 class="font-bold text-gray-700 mb-3 text-sm">🗂️ آخر النشاطات</h3>
                <div x-show="!dashActivity.length" class="text-center text-gray-400 py-6 text-sm">لا يوجد نشاط مسجّل</div>
                <ul class="space-y-2 max-h-[220px] overflow-y-auto">
                  <template x-for="a in dashActivity" :key="a.id">
                    <li class="flex items-start gap-2 text-xs">
                      <span class="text-gray-400 mt-0.5 shrink-0" x-text="new Date(a.at).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})"></span>
                      <div>
                        <span class="font-semibold text-gray-700" x-text="a.userName"></span>
                        <span class="text-gray-500 mx-1" x-text="activityLabel(a.action)"></span>
                        <span class="text-brand-600" x-text="a.entityType || ''"></span>
                      </div>
                    </li>
                  </template>
                </ul>
              </div>
            </div>

            <!-- الوثائق التي تستحق المراجعة -->
            <div x-show="dashExpiring.length > 0" class="bg-white rounded-2xl border shadow-sm p-4">
              <h3 class="font-bold text-gray-700 mb-3 text-sm">📄 وثائق تستحق المراجعة خلال 30 يوماً</h3>
              <div class="overflow-x-auto">
                <table class="w-full text-xs">
                  <thead class="bg-gray-50">
                    <tr>
                      <th class="px-3 py-2 text-right font-semibold text-gray-600">الرمز</th>
                      <th class="px-3 py-2 text-right font-semibold text-gray-600">العنوان</th>
                      <th class="px-3 py-2 text-right font-semibold text-gray-600">تاريخ المراجعة</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="d in dashExpiring" :key="d.id">
                      <tr class="border-t hover:bg-amber-50">
                        <td class="px-3 py-2 font-mono text-amber-700" x-text="d.code"></td>
                        <td class="px-3 py-2 text-gray-700" x-text="d.title"></td>
                        <td class="px-3 py-2 text-red-600 font-semibold" x-text="new Date(d.reviewDate).toLocaleDateString('ar-SA')"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- التقرير السنوي GAAFZA (C3) -->
            <div class="mt-4 bg-white border border-gray-200 rounded-2xl p-4 shadow-sm">
              <div class="flex items-center justify-between">
                <div>
                  <h3 class="font-bold text-gray-700 text-sm">📊 التقرير السنوي — GAAFZA</h3>
                  <p class="text-xs text-gray-500 mt-1">تقرير الامتثال السنوي للجهات الرقابية · يشمل المستفيدين والتبرعات والجودة</p>
                </div>
                <button @click="openGaafzaReport()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors shadow">
                  🖨️ إنشاء التقرير
                </button>
              </div>
            </div>

            <!-- مركز التقارير التحليلية -->
            <div class="mt-4 bg-gradient-to-l from-indigo-50 to-blue-50 border border-indigo-200 rounded-2xl p-4 shadow-sm">
              <div class="flex items-center justify-between flex-wrap gap-3">
                <div>
                  <h3 class="font-bold text-gray-700 text-sm">📚 مركز التقارير التحليلية</h3>
                  <p class="text-xs text-gray-500 mt-1">تقارير تحليلية جاهزة للطباعة · تحليل باريتو لعدم المطابقات · تحليل الشكاوى · سجل المخاطر</p>
                </div>
                <div class="flex gap-2 flex-wrap">
                  <button @click="openReport('/api/reports/hub')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl shadow">📚 مركز التقارير</button>
                  <button @click="openReport('/api/reports/complaints-analytics?year=' + new Date().getFullYear())" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow">📊 تحليل الشكاوى</button>
                  <button @click="openReport('/api/reports/ncr-analytics?year=' + new Date().getFullYear())" class="bg-red-600 hover:bg-red-700 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow">🔍 تحليل NCR (باريتو)</button>
                  <button @click="openReport('/api/reports/risk-register')" class="bg-amber-600 hover:bg-amber-700 text-white text-xs font-semibold px-3 py-2 rounded-xl shadow">⚠️ سجل المخاطر</button>
                </div>
              </div>
            </div>

          </div>

          <!-- GENERIC LIST PAGE -->
          <template x-if="!['dashboard','audit-log','iso-readiness','surveys','myAcknowledgments','acknowledgmentsMatrix','kpiTracking','reportBuilder'].includes(page)">
            <div>
              <!-- Toolbar (sticky — stays visible while scrolling table) -->
              <div class="sticky top-[76px] z-10 px-4 md:px-6 py-3 mb-4 bg-white/90 backdrop-blur rounded-2xl shadow-sm ring-1 ring-black/5 mx-4 md:mx-0">
                <!-- Smart filter chips -->
                <div x-show="currentModule?.quickFilters?.length" class="flex items-center gap-2 flex-wrap mb-2 pb-2 border-b">
                  <span class="text-xs text-gray-500 ml-1">فلاتر سريعة:</span>
                  <template x-for="qf in (currentModule?.quickFilters||[])" :key="qf.key">
                    <button @click="toggleQuickFilter(qf.key)"
                            :class="quickFilter===qf.key

                              : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                            class="text-xs border rounded-full px-3 py-1 transition">
                      <span x-text="qf.icon"></span>
                      <span x-text="qf.label"></span>
                    </button>
                  </template>
                  <button x-show="quickFilter" @click="quickFilter=''; loadList(1)"
                          class="text-xs text-red-600 hover:underline">✕ إزالة الفلتر</button>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                <input id="qms-search-input" x-model="search" @input.debounce.400ms="loadList(1)" placeholder="🔍 بحث... (اضغط / للتركيز السريع)" title="اختصار: اضغط / للبحث السريع" class="border rounded-lg px-3 py-2 flex-1 min-w-[160px] max-w-xs" />
                <select x-show="currentModule?.statusOptions" x-model="filterStatus" @change="loadList(1)" class="border rounded-lg px-3 py-2 text-sm bg-white">
                  <template x-for="o in (currentModule?.statusOptions||[])" :key="o.v">
                    <option :value="o.v" x-text="o.l"></option>
                  </template>
                </select>
                <button x-show="currentModule && canCreate(currentResource) && !showDeleted" @click="openCreate()" title="اختصار: Ctrl+N" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm">➕ إضافة</button>
                <button x-show="canCreate(currentResource) && !showDeleted && ['complaints','ncr','risks','managementReview'].includes(page)"
                        @click="openWizard({complaints:'complaint',ncr:'ncr',risks:'risk',managementReview:'managementReview'}[page])"
                        class="bg-violet-600 hover:bg-violet-700 text-white px-4 py-2 rounded-lg text-sm"
                        title="معالج خطوة بخطوة — أبسط للمستخدمين الجدد">🧭 معالج</button>
                <label x-show="canViewDeleted" class="flex items-center gap-1 text-xs text-gray-600 cursor-pointer select-none" :title="showDeleted ? 'عرض السجلات النشطة فقط' : 'عرض السجلات المحذوفة (سلة المحذوفات)'">
                  <input type="checkbox" x-model="showDeleted" @change="loadList(1)" class="rounded">
                  <span x-text="showDeleted ? '🗑️ سلة المحذوفات' : '🗑️ المحذوفات'"></span>
                </label>
                <button x-show="currentModule?.exportable" @click="exportExcel()" class="border border-green-600 text-green-700 hover:bg-green-50 px-4 py-2 rounded-lg text-sm font-medium">⬇️ Excel</button>
                <span class="text-xs text-gray-500 mr-auto" x-show="totalItems" x-text="'الإجمالي: ' + totalItems"></span>
                </div>

              <!-- Mobile card view (< md) — يُعرض على الشاشات الصغيرة بدل الجدول -->
              <div class="md:hidden space-y-2">
                <template x-for="item in items" :key="'card-' + item.id">

                    <dl class="space-y-1.5 text-sm">
                      <template x-for="col in currentCols" :key="'cardcell-' + col.key + '-' + item.id">
                        <div class="flex items-start gap-2">
                          <dt class="text-[11px] text-gray-500 font-medium whitespace-nowrap pt-0.5 min-w-[90px]" x-text="col.label + ':'"></dt>
                          <dd class="min-w-0 break-words flex-1" x-html="renderCell(item, col)"></dd>

                      </template>

                      <button x-show="canDelete(currentResource) && !item.deletedAt" @click="remove(item.id)" class="text-red-600 hover:underline">🗑️ حذف</button>
                      <button x-show="item.deletedAt && canDelete(currentResource)" @click="restoreItem(item)" class="text-green-600 hover:underline">♻️ استعادة</button>
                      <button x-show="['complaints','ncr','objectives','documents','risks','suppliers'].includes(page)"
                              @click="openDetail(
                                page==='complaints' ? 'complaint' :
                                page==='ncr' ? 'ncr' :
                                page==='objectives' ? 'objective' :
                                page==='documents' ? 'document' :
                                page==='risks' ? 'risk' : 'supplier', item.id)"
                              class="text-indigo-600 hover:underline">🔍 عرض</button>
                    </div>
                  </div>
                </template>
                <div x-show="!items?.length" class="text-center text-gray-400 py-8 text-sm">لا توجد بيانات لعرضها بعد</div>
              </div>

              <!-- Desktop Table (≥ md) -->
              <div class="bg-white border rounded-xl overflow-x-auto hidden md:block">
                <table class="w-full text-sm">
                  <thead class="bg-gray-100 text-right">
                    <tr>
                      <template x-for="col in currentCols" :key="col.key">
                        <th class="px-3 py-2 font-semibold text-gray-600" x-text="col.label"></th>
                      </template>
                      <th class="px-3 py-2">الإجراءات</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="item in items" :key="item.id">
                      <tr class="border-t hover:bg-gray-50">
                        <template x-for="col in currentCols" :key="col.key">
                          <td class="px-3 py-2" x-html="renderCell(item, col)"></td>
                        </template>
                        <td class="px-3 py-2 whitespace-nowrap">
                          <!-- Workflow state badge (Maker/Checker/Approver) -->
                          <span x-show="hasWorkflow(currentResource) && item.workflowState"
                                :class="'inline-block px-2 py-0.5 rounded-full text-[10px] font-semibold ml-2 ' + workflowStateClass(item.workflowState)"

                          <button x-show="canWorkflow(item, 'submit',  currentResource)" @click="doWorkflow(item, 'submit',  currentResource)" class="text-blue-600 hover:underline text-xs ml-2">📤 إرسال</button>
                          <button x-show="canWorkflow(item, 'review',  currentResource)" @click="doWorkflow(item, 'review',  currentResource)" class="text-yellow-700 hover:underline text-xs ml-2">🔍 استلام للمراجعة</button>
                          <button x-show="canWorkflow(item, 'approve', currentResource)" @click="doWorkflow(item, 'approve', currentResource)" class="text-green-700 hover:underline text-xs ml-2">✅ اعتماد</button>
                          <button x-show="canWorkflow(item, 'reject',  currentResource)" @click="doWorkflow(item, 'reject',  currentResource)" class="text-red-600 hover:underline text-xs ml-2">❌ رفض</button>
                          <button x-show="canWorkflow(item, 'reopen',  currentResource)" @click="doWorkflow(item, 'reopen',  currentResource)" class="text-gray-600 hover:underline text-xs ml-2">🔄 إعادة فتح</button>
                          <template x-if="!item.deletedAt">
                            <span>

          <!-- MY KPI ENTRY MODAL -->

                  <div class="text-xs opacity-80 mt-1">

                    </div>
                    <span class="flex-1 h-px bg-white/40"></span>

                  <div>

                        <div><div class="text-gray-500">نسبة التحقيق</div><div class="font-bold text-base" x-text="myKpiForm.preview.evaluation.ratio != null ? (myKpiForm.preview.evaluation.ratio*100).toFixed(0)+'%' : '—'"></div></div>
                        <div><div class="text-gray-500">المتوقع</div><div class="font-bold text-base" x-text="myKpiForm.preview.evaluation.expected?.toFixed(1) || '—'"></div></div>
                        <div><div class="text-gray-500">الفعلي</div><div class="font-bold text-base" x-text="myKpiForm.preview.evaluation.actual?.toFixed(1) || '—'"></div></div>
                      </div>
                      <template x-if="myKpiForm.preview.evaluation.forecast != null">
                        <div class="text-xs text-gray-600 mt-2 border-t pt-2">

                        </div>

                      <template x-if="myKpiForm.preview.evaluation.alerts && myKpiForm.preview.evaluation.alerts.length">
                        <div class="mt-2 space-y-1">

                              <span class="font-bold" x-text="a.severity"></span> · <span x-text="a.message"></span>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="myKpiForm.preview && myKpiForm.preview.locked">
                    <div class="rounded-lg p-3 border-2 border-red-300 bg-red-50 text-sm text-red-800">
                      🔒 <span x-text="myKpiForm.preview.lockReason"></span>
                    </div>
                  </template>
                </div>

                <!-- STEP 3: نتيجة الحفظ -->

                    <div :class="'rounded-lg p-4 border-2 text-center ' + ragBgSoft(myKpiForm.result.rag)">
                      <div class="text-3xl mb-2">✅</div>
                      <div class="font-bold" x-text="myKpiForm.result.message"></div>
                      <div class="text-xs text-gray-700 mt-2">

                        <span class="font-bold" x-text="myKpiForm.result.ratio != null ? (myKpiForm.result.ratio*100).toFixed(0)+'%' : '—'"></span>

                    </div>
                  </template>

                      <button @click="closeMyKpiForm()" class="px-4 py-2 border rounded-lg text-gray-600 hover:bg-gray-100">إلغاء</button>
                    </div>
                  </template>
                  <!-- Step 2 footer -->
                  <template x-if="myKpiForm.step===2">
                    <div class="flex gap-2 w-full">
                      <button @click="backToMyKpiEdit()" :disabled="myKpiForm.busy"
                        class="px-4 py-2 border rounded-lg text-gray-600 hover:bg-gray-100">▶ رجوع</button>

                        <span x-show="!myKpiForm.busy">💾 تأكيد الحفظ</span>
                        <span x-show="myKpiForm.busy">…جاري الحفظ</span>
                      </button>
                    </div>
                  </template>
                  <!-- Step 3 footer -->
                  <template x-if="myKpiForm.step===3">
                    <button @click="closeMyKpiForm()" class="flex-1 bg-violet-600 hover:bg-violet-700 text-white font-semibold px-4 py-2 rounded-lg">تم</button>
                  </template>

              </div>

          <!-- DATA HEALTH REPORT (Batch 13) -->
          <div x-show="page==='dataHealth'" x-cloak>
            <template x-if="dataHealth">
              <div>
                <div class="bg-gradient-to-l from-teal-600 to-cyan-600 text-white rounded-xl p-6 mb-4 shadow">
                  <div class="flex justify-between items-center flex-wrap gap-4">
                    <div>
                      <div class="text-sm opacity-90">🩺 تقرير صحة البيانات المؤسسية</div>
                      <h2 class="text-2xl font-bold mt-1">Data Health Report</h2>
                      <div class="text-xs opacity-80 mt-1">
                        حُدِّث: <span x-text="new Date(dataHealth.generatedAt).toLocaleString('ar-SA')"></span>
                      </div>
                    </div>
                    <div class="text-center">
                      <div class="text-5xl font-bold" x-text="dataHealth.summary.healthScore"></div>
                      <div class="text-xs opacity-90">درجة الصحة / 100</div>
                    </div>
                  </div>
                  <div class="mt-3 grid grid-cols-4 gap-2 text-center text-sm">
                    <div class="bg-white/10 rounded p-2">
                      <div class="font-bold text-xl" x-text="dataHealth.summary.totalFindings"></div>
                      <div class="text-xs opacity-90">إجمالي</div>
                    </div>
                    <div class="bg-red-500/40 rounded p-2">
                      <div class="font-bold text-xl" x-text="dataHealth.summary.critical"></div>
                      <div class="text-xs opacity-90">حرج</div>
                    </div>
                    <div class="bg-orange-500/40 rounded p-2">
                      <div class="font-bold text-xl" x-text="dataHealth.summary.high"></div>
                      <div class="text-xs opacity-90">مرتفع</div>
                    </div>
                    <div class="bg-amber-500/40 rounded p-2">
                      <div class="font-bold text-xl" x-text="dataHealth.summary.warning"></div>
                      <div class="text-xs opacity-90">تحذير</div>
                    </div>
                  </div>
                </div>

                  <template x-for="c in dataHealth.checks" :key="c.key">
                    <div class="bg-white rounded-xl border overflow-hidden">
                      <button @click="toggleHealthCheck(c.key)"
                        class="w-full px-4 py-3 flex items-center justify-between hover:bg-gray-50 transition">
                        <div class="flex items-center gap-3">
                          <span :class="'w-3 h-3 rounded-full ' + healthSeverityClass(c.severity)"></span>
                          <div class="text-right">
                            <div class="font-bold text-gray-800" x-text="c.title"></div>
                            <div class="text-xs text-gray-500" x-text="c.hint"></div>
                          </div>
                        </div>
                        <div class="flex items-center gap-3">
                          <span :class="'text-xs px-2 py-0.5 rounded text-white ' + healthSeverityClass(c.severity)"
                                x-text="healthSeverityLabel(c.severity)"></span>
                          <span class="text-2xl font-bold" :class="c.count ? 'text-red-600' : 'text-green-600'"
                                x-text="c.count"></span>
                          <span class="text-gray-400" x-text="dataHealthExpanded[c.key] ? '▼' : '◀'"></span>
                        </div>

                    </div>

                </div>
              </div>

                        <span x-show="myWork.viewMode==='QUALITY'">🛡️ لوحة الجودة — الانحرافات والحالات الحرجة</span>

                      <div class="text-5xl font-bold" x-text="myWork.summary.totalActions"></div>
                      <div class="text-xs opacity-90">إجمالي المهام</div>

                  </div>

                      <span x-text="f.label"></span>
                    </button>

                  </div>

                <div x-show="!rb.filters.length" class="text-xs text-gray-400">بدون فلاتر.</div>
              </div>

              <!-- Group & aggregations -->
              <div x-show="rb.dataset" class="mb-3 pt-3 border-t">

                  <div class="flex items-center gap-2 mb-1">

                      <template x-for="fn in rbAggFns" :key="fn.v"><option :value="fn.v" x-text="fn.l"></option></template>

                    <select x-model="a.field" class="border rounded px-2 py-1 text-xs">
                      <option value="">— حقل رقمي —</option>
                      <template x-for="f in rbAggregatableFields" :key="f.key"><option :value="f.key" x-text="f.label"></option></template>
                    </select>
                    <button @click="rbRemoveAgg(i)" class="text-red-500 text-xs">✕</button>
                  </div>
                </template>
              </div>

              <!-- Error -->
              <div x-show="rb.error" class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm" x-text="rb.error"></div>

                      </template>
                    </tbody>
                  </table>
                </template>

                <template x-if="rb.result?.mode==='groupBy'">
                  <table class="w-full text-xs">
                    <thead class="bg-gray-50 sticky top-0">
                      <tr>

                    <tbody>
                      <template x-for="(row, ri) in rb.result.rows" :key="ri">

                    </tbody>
                  </table>
                </template>
              </div>
            </div>

                      <span class="text-red-600" x-text="p.red"></span>🔴 ·

                          <td class="px-2 py-2" x-text="kpiFmt(v.actual)"></td>
                          <td class="px-2 py-2 text-gray-500" x-text="kpiFmt(v.expected)"></td>
                          <td class="px-2 py-2 font-bold" :class="v.ratio>=0.95?'text-emerald-600':v.ratio>=0.75?'text-amber-500':'text-red-600'" x-text="Math.round(v.ratio*100)+'%'"></td>

                          <td class="px-2 py-2"><button @click="kpiLoadDetail(v.kind, v.id)" class="text-indigo-600 hover:underline text-xs">تفاصيل ←</button></td>
                        </tr>
                      </template>
                      <tr x-show="!(kpi.dashboard?.topVariances||[]).length">

                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

                    </div>
                  </template>
                </div>
              </div>
            </div>

            <!-- ─── Matrix (heatmap) view ─────────────────────────── -->
            <div x-show="kpi.view==='matrix' && kpi.matrix && !kpi.loading" x-cloak class="bg-white border rounded-xl p-3 overflow-x-auto">

                    <button @click="kpiToggleQuick(key)"
                      :class="kpi.quick.includes(key)

                      <span x-text="meta.label"></span>

                    </button>
                  </template>
                  <button x-show="kpi.quick.length || kpi.perspective"

                    <button @click="kpiSetPerspective(p)"

                <div class="text-[11px] text-gray-500" x-show="kpi.matrix">

                  من <span x-text="kpi.matrix?.counts?.total ?? 0"></span>
                </div>
              </div>

              <!-- شريط تنبيه القراءات المتأخرة -->
              <div x-show="(kpi.matrix?.counts?.missing||0) > 0" x-cloak

                  <span class="text-red-600">⏰</span>
                  <span class="text-red-800">
                    <span class="font-bold" x-text="kpi.matrix.counts.missing"></span>
                    قراءة غير مُدخلة لهذا الشهر
                  </span>
                </div>

                        :class="kpi.quick.includes('missing') ? 'bg-red-600 text-white' : 'bg-white text-red-700 border border-red-300'"

                </button>
              </div>

              <table class="text-xs w-full">
                <thead class="text-gray-500 text-[11px]">

                    <th class="text-right px-2 py-2 sticky right-0 bg-white min-w-[200px]">المؤشر/النشاط</th>
                    <template x-for="m in 12" :key="m"><th class="px-1 py-2 text-center min-w-[50px]" x-text="kpiMonthName(m).slice(0,3)"></th></template>
                    <th class="px-2 py-2">%</th>
                    <th class="px-2 py-2">الحالة</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in [...(kpi.matrix?.objectives||[]), ...(kpi.matrix?.activities||[])]" :key="row.id">

                      <td class="px-2 py-1.5 sticky right-0 bg-white border-l" :class="kpiRowBorder(row.rag)">

                          <span x-show="kpiIsLate(row)" class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-[9px] bg-red-100 text-red-700 font-bold whitespace-nowrap" title="لم تُدخل قراءة الشهر السابق بعد">⏰ متأخر</span>
                        </div>
                        <div class="text-[10px] text-gray-400" x-text="(row.code||'') + ' · ' + row.kpiType"></div>
                      </td>
                      <template x-for="cell in row.months" :key="cell.month">
                        <td class="px-1 py-1 text-center">
                          <button type="button"
                               @click="kpiQuickEntryFromCell(row, cell.month)"
                               class="w-full h-7 rounded flex items-center justify-center text-[10px] font-bold text-white transition hover:ring-2 hover:ring-indigo-400 hover:scale-105"
                               :class="kpiRagColor(cell.status)"
                               :title="(cell.actualValue!=null ? ('فعلي: ' + cell.actualValue) : 'لا توجد بيانات') + ' — اضغط للإدخال السريع'"
                               x-text="cell.actualValue!=null ? kpiFmt(cell.actualValue) : '·'"></button>
                        </td>
                      </template>
                      <td class="px-2 py-1 text-center font-bold" :class="row.ratio>=0.95?'text-emerald-600':row.ratio>=0.75?'text-amber-500':'text-red-600'" x-text="row.ratio!=null ? Math.round(row.ratio*100)+'%':'—'"></td>
                      <td class="px-2 py-1 text-center"><button @click="kpiLoadDetail(row.kind, row.id)" class="text-indigo-500 hover:underline text-xs">تفاصيل</button></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- ─── Entry view ────────────────────────────────────── -->
            <div x-show="kpi.view==='entry'" x-cloak class="bg-white border rounded-xl p-6 max-w-2xl mx-auto">
              <h3 class="font-bold text-gray-700 mb-4">✏️ إدخال قيمة فعلية لشهر <span class="text-indigo-600" x-text="kpiMonthName(kpi.month)+' '+kpi.year"></span></h3>
              <div class="space-y-3">
                <div>
                  <label class="block text-sm font-medium mb-1">النوع</label>
                  <div class="flex gap-2">
                    <button @click="kpi.entryForm.kind='objective';kpi.entryForm.id=''" :class="kpi.entryForm.kind==='objective'?'bg-indigo-600 text-white':'bg-slate-100'" class="px-4 py-2 rounded-lg text-sm flex-1">🎯 مؤشر استراتيجي</button>
                    <button @click="kpi.entryForm.kind='activity';kpi.entryForm.id=''" :class="kpi.entryForm.kind==='activity'?'bg-indigo-600 text-white':'bg-slate-100'" class="px-4 py-2 rounded-lg text-sm flex-1">⚙️ نشاط تشغيلي</button>
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">المؤشر/النشاط</label>
                  <select x-model="kpi.entryForm.id" class="w-full border rounded-lg px-3 py-2">
                    <option value="">— اختر —</option>
                    <template x-if="kpi.entryForm.kind==='objective'">
                      <template x-for="o in kpi.objectivesList" :key="o.id"><option :value="o.id" x-text="o.title + ' (هدف: ' + o.targetValue + ' ' + (o.unit||'') + ')'"></option></template>
                    </template>
                    <template x-if="kpi.entryForm.kind==='activity'">
                      <template x-for="a in kpi.activitiesList" :key="a.id"><option :value="a.id" x-text="a.code + ' — ' + a.title + ' (هدف: ' + (a.targetValue||'') + ' ' + (a.unit||'') + ')'"></option></template>
                    </template>
                  </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-medium mb-1">القيمة الفعلية *</label>
                    <input type="number" step="any" x-model="kpi.entryForm.actualValue" class="w-full border rounded-lg px-3 py-2" placeholder="مثال: 120" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium mb-1">المصروف (ريال)</label>
                    <input type="number" step="any" x-model="kpi.entryForm.spent" class="w-full border rounded-lg px-3 py-2" placeholder="اختياري للنشاطات" />
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">ملاحظة</label>
                  <textarea x-model="kpi.entryForm.note" rows="2" class="w-full border rounded-lg px-3 py-2" placeholder="شرح/سياق الأداء لهذا الشهر..."></textarea>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">رابط الدليل/المستند</label>
                  <input type="url" x-model="kpi.entryForm.evidenceUrl" class="w-full border rounded-lg px-3 py-2" placeholder="https://..." />
                </div>
                <div class="flex gap-2 pt-3 border-t">
                  <button @click="kpiSaveEntry()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium">💾 حفظ</button>
                  <button @click="kpi.view='dashboard';kpiLoadDashboard()" class="px-4 py-2 rounded-lg border">إلغاء</button>
                </div>
              </div>
            </div>

            <!-- ─── Alerts view ───────────────────────────────────── -->
            <div x-show="kpi.view==='alerts' && !kpi.loading" x-cloak class="bg-white border rounded-xl p-4">

              <div class="space-y-2 max-h-[600px] overflow-y-auto">
                <template x-for="a in kpi.alerts" :key="a.id+a.code">
                  <div class="flex items-start gap-3 p-3 rounded-lg border" :class="kpiSeverityColor(a.severity)">
                    <span class="text-xs font-bold px-2 py-0.5 rounded bg-white flex-shrink-0" x-text="kpiSeverityLabel(a.severity)"></span>
                    <div class="flex-1">
                      <div class="text-sm font-medium" x-text="a.title"></div>
                      <div class="text-xs opacity-75 mt-0.5" x-text="a.msg"></div>
                      <div class="text-[10px] opacity-60 mt-1" x-text="(a.perspective||'') + ' · ' + (a.code||'')"></div>
                    </div>
                    <button @click="kpiLoadDetail(a.kind, a.id)" class="text-xs hover:underline flex-shrink-0">تفاصيل ←</button>
                  </div>
                </template>
                <div x-show="!kpi.alerts.length" class="text-center text-gray-400 py-8">✨ لا توجد تنبيهات نشطة</div>
              </div>
            </div>

            <!-- ─── Detail view ───────────────────────────────────── -->
            <div x-show="kpi.view==='detail' && kpi.detail && !kpi.loading" x-cloak class="space-y-4">

                  <div>
                    <h3 class="font-bold text-lg text-brand-700" x-text="kpi.detail?.record?.title"></h3>
                    <div class="text-sm text-gray-500 mt-1" x-text="(kpi.detail?.record?.code||'') + ' · ' + kpi.detail?.kpi.kpiType + ' · الهدف: ' + kpi.detail?.kpi.targetValue + ' ' + (kpi.detail?.kpi.unit||'')"></div>
                  </div>
                  <div class="text-center">
                    <div class="text-3xl font-bold" :class="kpi.detail?.evaluation.rag==='GREEN'?'text-emerald-600':kpi.detail?.evaluation.rag==='YELLOW'?'text-amber-500':kpi.detail?.evaluation.rag==='RED'?'text-red-600':'text-slate-400'" x-text="kpi.detail?.evaluation.ratio!=null ? Math.round(kpi.detail.evaluation.ratio*100)+'%' : '—'"></div>
                    <div class="text-xs text-gray-500" x-text="kpiRagLabel(kpi.detail?.evaluation.rag)"></div>
                  </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
                  <div class="bg-slate-50 p-2 rounded-lg"><div class="text-[11px] text-gray-500">الفعلي حتى الآن</div><div class="text-lg font-bold" x-text="kpiFmt(kpi.detail?.evaluation.actual)"></div></div>
                  <div class="bg-slate-50 p-2 rounded-lg"><div class="text-[11px] text-gray-500">المتوقع في هذا الشهر</div><div class="text-lg font-bold" x-text="kpiFmt(kpi.detail?.evaluation.expected)"></div></div>
                  <div class="bg-slate-50 p-2 rounded-lg"><div class="text-[11px] text-gray-500">التوقع بنهاية السنة</div><div class="text-lg font-bold" x-text="kpiFmt(kpi.detail?.evaluation.forecast)"></div></div>
                  <div class="bg-slate-50 p-2 rounded-lg"><div class="text-[11px] text-gray-500">المصروف</div><div class="text-lg font-bold" x-text="kpiFmt(kpi.detail?.evaluation.totalSpent)"></div></div>

                <div class="mt-4" x-show="(kpi.detail?.evaluation.alerts||[]).length">
                  <div class="text-sm font-bold mb-2">🚨 تنبيهات</div>

                    <div class="text-xs p-2 rounded mb-1 border" :class="kpiSeverityColor(a.severity)" x-text="a.msg"></div>
                  </template>
                </div>
              </div>

              <div class="bg-white border rounded-xl p-4">
                <h3 class="font-bold text-gray-700 mb-3">📈 الأداء الشهري</h3>

              <!-- Monthly entries table -->

                <h3 class="font-bold text-gray-700 mb-3">📅 الإدخالات الشهرية</h3>

                  <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-right text-xs text-gray-500">
                      <tr><th class="px-2 py-2">الشهر</th><th class="px-2 py-2">المستهدف</th><th class="px-2 py-2">الفعلي</th><th class="px-2 py-2">التراكمي</th><th class="px-2 py-2">المصروف</th><th class="px-2 py-2">الحالة</th><th class="px-2 py-2">ملاحظة</th></tr>
                    </thead>
                    <tbody>
                      <template x-for="s in (kpi.detail?.series||[])" :key="s.month">
                        <tr class="border-t" :class="s.month===kpi.month?'bg-indigo-50':''">

                          <td class="px-2 py-1.5 text-gray-500" x-text="kpiFmt(s.expected)"></td>
                          <td class="px-2 py-1.5 font-medium" x-text="s.actual!=null ? kpiFmt(s.actual) : '—'"></td>
                          <td class="px-2 py-1.5" x-text="s.cumulativeActual!=null ? kpiFmt(s.cumulativeActual) : '—'"></td>

                          <td class="px-2 py-1.5"><span class="inline-block w-3 h-3 rounded-full" :class="kpiRagColor(s.status)"></span></td>
                          <td class="px-2 py-1.5 text-xs text-gray-500" x-text="s.note||''"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

          </div>
          <!-- end KPI TRACKING -->

        </div>

        <!-- SUPPLIER EVAL WIZARD (3 steps: info → scoring → review) -->
        <div x-show="evalModal.open" x-cloak class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" @keydown.escape.window="evalModal.open=false">
          <div class="bg-white rounded-xl w-full max-w-xl max-h-[90vh] overflow-y-auto shadow-2xl" @click.outside="evalModal.open=false">
            <div class="p-4 border-b">
              <div class="flex justify-between items-start">
                <div>
                  <h3 class="font-bold text-brand-700">📊 تقييم أداء المورد</h3>
                  <div class="text-sm text-gray-500 mt-0.5" x-text="evalModal.supplier?.name"></div>

        <!-- UX-2: WIZARD — 3-step guided creation -->
        <div x-show="wizard" x-cloak
             class="fixed inset-0 bg-black/50 flex items-center justify-center z-[70] p-4"
             @keydown.escape.window="closeWizard()">
          <div class="bg-white rounded-2xl w-full max-w-xl max-h-[92vh] overflow-y-auto shadow-2xl"
               @click.outside="closeWizard()">
            <template x-if="wizard && currentWizardFlow()">
              <div>
                <!-- Header with progress -->
                <div class="bg-gradient-to-l from-violet-700 to-indigo-700 text-white p-4 rounded-t-2xl">
                  <div class="flex justify-between items-center">
                    <div>
                      <div class="text-xs opacity-80" x-text="currentWizardFlow().icon + ' معالج متدرّج'"></div>
                      <div class="font-bold text-lg mt-0.5" x-text="currentWizardFlow().title"></div>
                    </div>
                    <button @click="closeWizard()" class="text-white/80 hover:text-white text-2xl leading-none">×</button>
                  </div>
                  <!-- Step dots -->
                  <div class="flex gap-1 mt-3">
                    <template x-for="n in wizardStepCount()" :key="n">
                      <div class="flex-1 h-1.5 rounded-full transition"
                           :class="(n-1) <= wizard.step ? 'bg-white' : 'bg-white/30'"></div>
                    </template>
                  </div>
                  <div class="text-xs opacity-80 mt-2">
                    الخطوة <span x-text="wizard.step + 1"></span> من <span x-text="wizardStepCount()"></span>
                    <span x-show="!wizardIsReviewStep()" x-text="' — ' + (wizardCurrentStep()?.title || '')"></span>
                    <span x-show="wizardIsReviewStep()">— مراجعة واعتماد</span>
                  </div>
                </div>

                <!-- Step form fields -->
                <div class="p-5 space-y-4" x-show="!wizardIsReviewStep()">
                  <template x-for="f in (wizardCurrentStep()?.fields || [])" :key="f.key">
                    <div>
                      <label class="block text-sm font-medium mb-1">
                        <span x-text="f.label"></span>
                        <span x-show="f.required" class="text-red-500">*</span>
                      </label>
                      <template x-if="f.type==='textarea'">
                        <textarea x-model="wizard.data[f.key]" :rows="f.rows||3" :placeholder="f.placeholder||''"
                                  class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 focus:border-violet-400 outline-none"></textarea>
                      </template>
                      <template x-if="f.type==='select'">
                        <select x-model="wizard.data[f.key]"
                                class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 focus:border-violet-400 outline-none bg-white">
                          <option value="">— اختر —</option>
                          <template x-for="o in (f.options||[])" :key="o.v">
                            <option :value="o.v" x-text="o.l"></option>
                          </template>
                        </select>
                      </template>
                      <template x-if="f.type==='date'">
                        <input type="date" x-model="wizard.data[f.key]"
                               class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 focus:border-violet-400 outline-none">
                      </template>
                      <template x-if="!['textarea','select','date'].includes(f.type)">
                        <input :type="f.type||'text'" x-model="wizard.data[f.key]" :placeholder="f.placeholder||''"
                               class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 focus:border-violet-400 outline-none">
                      </template>
                      <div x-show="f.hint" class="text-xs text-gray-500 mt-1" x-text="f.hint"></div>
                    </div>
                  </template>
                </div>

                <!-- Review step -->
                <div class="p-5 space-y-2" x-show="wizardIsReviewStep()">
                  <div class="text-sm text-gray-600 mb-2">راجع البيانات قبل الحفظ — يمكنك الرجوع للتعديل:</div>
                  <template x-for="step in currentWizardFlow().steps" :key="step.title">
                    <div class="bg-gray-50 rounded-lg p-3">
                      <div class="text-xs font-bold text-gray-500 mb-2" x-text="step.title"></div>
                      <dl class="text-sm space-y-1">
                        <template x-for="f in step.fields" :key="f.key">
                          <div class="flex justify-between gap-2">
                            <dt class="text-gray-600 whitespace-nowrap" x-text="f.label + ':'"></dt>
                            <dd class="font-medium text-gray-900 text-left" x-text="wizardFieldDisplay(f)"></dd>
                          </div>
                        </template>
                      </dl>
                    </div>
                  </template>
                </div>

                <!-- Error -->
                <div x-show="wizard.error" class="mx-5 mb-3 bg-red-50 border border-red-200 text-red-700 rounded p-2 text-sm" x-text="wizard.error"></div>

                <!-- Footer nav -->
                <div class="p-4 bg-gray-50 rounded-b-2xl flex justify-between gap-2">
                  <button @click="wizardBack()" x-show="wizard.step > 0"
                          :disabled="wizard.busy"
                          class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-100 text-sm">← السابق</button>
                  <span x-show="wizard.step === 0"></span>
                  <div class="flex gap-2">
                    <button @click="closeWizard()"
                            class="text-gray-600 hover:text-gray-800 px-4 py-2 rounded text-sm">إلغاء</button>
                    <button @click="wizardNext()"
                            x-show="!wizardIsReviewStep()"
                            class="bg-violet-600 hover:bg-violet-700 text-white px-5 py-2 rounded text-sm">التالي ←</button>
                    <button @click="wizardSubmit()"
                            x-show="wizardIsReviewStep()"
                            :disabled="wizard.busy"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded text-sm"
                            x-text="wizard.busy ? 'جارٍ الحفظ…' : '✅ حفظ واعتماد'"></button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- ISO 8.4.2 — سجل تقييمات المورّد (Timeline + Stats) -->

              <div class="p-6">

                      <div class="bg-slate-50 rounded p-3 text-center">
                        <div class="text-xs text-gray-600">عدد التقييمات</div>
                        <div class="text-xl font-bold" x-text="supplierHistory.stats.totalEvaluations || 0"></div>
                      </div>
                      <div class="bg-slate-50 rounded p-3 text-center">
                        <div class="text-xs text-gray-600">المتوسط</div>
                        <div class="text-xl font-bold" x-text="supplierHistory.stats.avgScore != null ? supplierHistory.stats.avgScore + '%' : '—'"></div>
                      </div>
                      <div class="bg-emerald-50 rounded p-3 text-center">
                        <div class="text-xs text-emerald-800">الأعلى</div>

                      </div>

                      </div>
                    </div>

                    <!-- Overall Trend -->
                    <div class="mb-5 p-3 rounded border border-slate-200 text-center font-medium"
                         :class="trendColor(supplierHistory.stats.overallTrend)"
                         x-text="overallTrendLabel(supplierHistory.stats.overallTrend)"></div>

                    <!-- Timeline -->
                    <div x-show="!supplierHistory.timeline.length" class="text-center py-8 text-gray-500">لا توجد تقييمات سابقة.</div>

                    <ol class="relative border-r-2 border-slate-200 pr-5 space-y-4">

                        <li class="relative">
                          <span class="absolute -right-[29px] top-1 w-4 h-4 rounded-full bg-white border-2"
                                :class="{
                                  'border-emerald-600': ev.trend==='improving',
                                  'border-rose-600':    ev.trend==='declining',
                                  'border-slate-500':   ev.trend==='stable',
                                  'border-blue-600':    ev.trend==='first',
                                }"></span>
                          <div class="bg-slate-50 rounded p-3 border border-slate-200">
                            <div class="flex flex-wrap items-center justify-between gap-2">
                              <div>
                                <span class="font-semibold" x-text="ev.code"></span>
                                <span class="text-xs text-gray-500 mr-2" x-text="fmtDate ? fmtDate(ev.evaluatedAt) : new Date(ev.evaluatedAt).toLocaleDateString('ar-SA-u-ca-gregory')"></span>

                              <div class="flex items-center gap-2">
                                <span class="text-lg font-bold" x-text="ev.percentage + '%'"></span>
                                <span class="text-xs px-2 py-0.5 rounded bg-slate-200" x-text="ev.grade"></span>
                              </div>
                            </div>
                            <div class="mt-2 flex items-center gap-2 text-xs">
                              <span :class="trendColor(ev.trend)" x-text="trendLabel(ev.trend)"></span>
                              <span x-show="ev.trend !== 'first'" class="text-gray-500" x-text="'(' + (ev.delta > 0 ? '+' : '') + ev.delta + ')'"></span>
                              <span class="text-gray-600 mr-auto" x-text="ev.decision"></span>
                              <span class="text-gray-500" x-text="ev.evaluator?.name || ''"></span>
                            </div>
                          </div>
                        </li>
                      </template>
                    </ol>
                  </div>
                </template>
              </div>
            </template>

                                <span x-text="' · ' + new Date(ev.when).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'})"></span>
