version: "3.9"

services:
  qms-db:
    image: postgres:16-alpine
    container_name: qms-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qms_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-qms_db}
    ports:
      - "5432:5432"
    volumes:
      - qms_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qms_user} -d ${POSTGRES_DB:-qms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qms-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: qms-dev-api
    restart: unless-stopped
    depends_on:
      qms-db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_NAME: ${APP_NAME:-نظام إدارة الجودة - جمعية البر بمحافظة صبيا}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      POSTGRES_USER: ${POSTGRES_USER:-qms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qms_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-qms_db}
      DATABASE_URL: ${DATABASE_URL:-postgresql://qms_user:qms_dev_password@qms-db:5432/qms_db?schema=public}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      REFRESH_SECRET: ${REFRESH_SECRET:-dev-refresh-secret-change-me}
      REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN:-30d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bir-sabia.org.sa}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@2026}
      ADMIN_NAME: ${ADMIN_NAME:-مسؤول النظام}
      QMS_SCHEDULER: off
    ports:
      - "3000:3000"
    volumes:
      - qms_dev_uploads:/app/uploads

volumes:
  qms_dev_db_data:
  qms_dev_uploads:
